<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tebak Angka</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    font-family: 'Fredoka', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f2744 0%, #1a3a52 100%);
    overflow-x: hidden;
}

#app {
    width: 100%;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: clamp(10px, 3vw, 15px);
    padding-top: clamp(15px, 4vw, 20px);
}

h1 {
    color: white;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    margin-bottom: clamp(20px, 5vw, 40px);
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    letter-spacing: 1px;
    text-align: center;
}

.circles-container {
    display: flex;
    align-items: center;
    gap: clamp(10px, 3vw, 20px);
    margin-bottom: clamp(20px, 5vw, 40px);
    flex-wrap: wrap;
    justify-content: center;
}

.circle-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(5px, 2vw, 10px);
}

.circle {
    width: clamp(45px, 13vw, 70px);
    height: clamp(45px, 13vw, 70px);
    border-radius: 50%;
    border: 4px solid #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(24px, 6vw, 40px);
    font-weight: 700;
    color: #fff;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3), inset -3px -3px 8px rgba(0, 0, 0, 0.2);
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    position: relative;
    overflow: hidden;
    transition: transform 0.3s;
}

.circle::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
    pointer-events: none;
}

.circle:hover {
    transform: scale(1.05);
}

.operator {
    color: white;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: bold;
}

.timer-container {
    width: 100%;
    max-width: 400px;
    margin-bottom: clamp(20px, 5vw, 30px);
    padding: 0 10px;
}

.timer-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    color: white;
    font-size: clamp(0.85rem, 2vw, 0.95rem);
}

.timer-text {
    color: #FACC15;
    font-weight: bold;
}

.timer-bar-bg {
    width: 100%;
    height: 12px;
    background: #1e3a5f;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid white;
}

.timer-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #10b981, #FACC15, #ef4444);
    transition: width 0.1s linear;
}

.numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(10px, 3vw, 15px);
    margin-bottom: clamp(20px, 5vw, 30px);
    width: 100%;
    max-width: 320px;
}

.num-btn {
    width: clamp(45px, 13vw, 70px);
    height: clamp(45px, 13vw, 70px);
    border-radius: 50%;
    border: 4px solid #fff;
    font-size: clamp(24px, 6vw, 40px);
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3), inset -3px -3px 8px rgba(0,0,0,0.2);
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
    transition: transform 0.3s;
}

.num-btn::before {
    content:'';
    position:absolute;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    background:linear-gradient(135deg, rgba(255,255,255,0.3), transparent);
}

.num-btn:active:not(.disabled) { transform: scale(1.15); }
.num-btn:hover:not(.disabled) { transform: scale(1.1); }

.num-btn.selected {
    transform: scale(1.2);
}

.num-btn.disabled {
    opacity: 0.3;
    pointer-events: none;
}

/* warna tetap */
.btn-1 { background: linear-gradient(135deg,#FF6B6B,#FF8E72);}
.btn-2 { background: linear-gradient(135deg,#FF9F5A,#FF7A59);}
.btn-3 { background: linear-gradient(135deg,#FFD93D,#FFC93A); color:#1e3a5f;}
.btn-4 { background: linear-gradient(135deg,#6BCB77,#4A9D6F);}
.btn-5 { background: linear-gradient(135deg,#4D96FF,#357ABD);}
.btn-6 { background: linear-gradient(135deg,#A78BFA,#8B5CF6);}
.btn-7 { background: linear-gradient(135deg,#F472B6,#EC4899);}
.btn-8 { background: linear-gradient(135deg,#22D3EE,#0891B2);}
.btn-9 { background: linear-gradient(135deg,#FB923C,#EA580C);}

.action-buttons {
    display: flex;
    gap: clamp(10px,2vw,15px);
    flex-wrap: wrap;
    justify-content: center;
}

.action-btn {
    padding: clamp(10px,2vw,12px) clamp(16px,3vw,24px);
    border-radius: 50px;
    font-weight: bold;
    border: none;
    color: white;
}

.reset-btn { background:#ef4444; }
.check-btn { background:#3b82f6; }
.new-btn { background:#FACC15; color:#1e3a5f; }

.score-display {
    color: white;
    margin-top: 15px;
}

.result-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    padding: 30px;
    border-radius: 20px;
    font-size: 30px;
    display: none;
    color: white;
}
</style>
</head>

<body>

<div id="app">
<h1>Tebak Angka</h1>

<div class="circles-container">
<div class="circle-group"><div id="c1" class="circle"></div></div>
<span class="operator">=</span>
<div class="circle-group"><div id="c2" class="circle"></div></div>
<span class="operator">×</span>
<div class="circle-group"><div id="c3" class="circle"></div></div>
</div>

<div class="timer-container">
<div class="timer-label">
<span>⏱️ Waktu Tersisa</span>
<span id="timerText">30s</span>
</div>
<div class="timer-bar-bg">
<div id="timerBar" class="timer-bar"></div>
</div>
</div>

<div id="numpad" class="numpad"></div>

<div class="action-buttons">
<button class="action-btn reset-btn" onclick="resetSelection()">Ganti ↺</button>
<button class="action-btn check-btn" onclick="checkAnswer()">Cek ✓</button>
<button class="action-btn new-btn" onclick="resetGame()">Baru 🔄</button>
</div>

<p class="score-display">Skor: <span id="scoreVal">0</span></p>
</div>

<div id="resultPopup" class="result-popup"></div>

<script>
let target=0;
let picks=[];
let score=0;
let timerInterval=null;
let timeLeft=30;

function generateProblem() {
            clearInterval(timerInterval);
            timeLeft = 30;
            document.getElementById('timerBar').style.width = '100%';

            const a = Math.floor(Math.random() * 8) + 2;
            const b = Math.floor(Math.random() * 8) + 2;
            target = a * b;

            picks = [];
            document.getElementById('c1').textContent = target;
            document.getElementById('c1').classList.add('pulse');
            setTimeout(() => document.getElementById('c1').classList.remove('pulse'), 600);

            document.getElementById('c2').textContent = '?';
            document.getElementById('c3').textContent = '?';

            updateCircleColors();
            buildNumpad();
            startTimer();
        }

        function updateCircleColors() {
            const resultColor = '#FF6B6B';
            const numberColor = '#4ECDC4';

            document.getElementById('c1').style.background = `linear-gradient(135deg, ${resultColor} 0%, ${adjustBrightness(resultColor, 20)} 100%)`;
            document.getElementById('c2').style.background = `linear-gradient(135deg, ${numberColor} 0%, ${adjustBrightness(numberColor, 20)} 100%)`;
            document.getElementById('c3').style.background = `linear-gradient(135deg, ${numberColor} 0%, ${adjustBrightness(numberColor, 20)} 100%)`;
        }

        function adjustBrightness(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = ((num >> 8) & 0x00ff) + amt;
            const B = (num & 0x0000ff) + amt;
            return '#' + (0x1000000 + (R < 255 ? (R < 1 ? 0 : R) : 255) * 0x10000 + (G < 255 ? (G < 1 ? 0 : G) : 255) * 0x100 + (B < 255 ? (B < 1 ? 0 : B) : 255)).toString(16).slice(1);
        }

        function buildNumpad() {
            const pad = document.getElementById('numpad');
            pad.innerHTML = '';
            const colorClasses = ['btn-1', 'btn-2', 'btn-3', 'btn-4', 'btn-5', 'btn-6', 'btn-7', 'btn-8', 'btn-9'];

            for (let i = 1; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.className = `num-btn ${colorClasses[i - 1]}`;
                btn.textContent = i;

                if (i === 1) {
                    btn.classList.add('disabled');
                } else {
                    btn.onclick = () => pickNum(i);
                }

                pad.appendChild(btn);
            }
        }

        function pickNum(n) {
            if (picks.length === 0) {
                picks.push(n);
                document.getElementById('c2').textContent = n;
                document.getElementById('c2').classList.add('pulse');
                setTimeout(() => document.getElementById('c2').classList.remove('pulse'), 600);
                updateButtonStates();
            } else if (picks.length === 1) {
                picks.push(n);
                document.getElementById('c3').textContent = n;
                document.getElementById('c3').classList.add('pulse');
                setTimeout(() => document.getElementById('c3').classList.remove('pulse'), 600);
                updateButtonStates();
            } else if (picks[0] === n) {
                picks[0] = n;
                document.getElementById('c2').textContent = n;
                document.getElementById('c2').classList.add('pulse');
                setTimeout(() => document.getElementById('c2').classList.remove('pulse'), 600);
            } else {
                picks[1] = n;
                document.getElementById('c3').textContent = n;
                document.getElementById('c3').classList.add('pulse');
                setTimeout(() => document.getElementById('c3').classList.remove('pulse'), 600);
                updateButtonStates();
            }
        }

        function updateButtonStates() {
            const buttons = document.querySelectorAll('.num-btn');
            buttons.forEach((btn) => {
                btn.classList.remove('selected');
            });

            if (picks.length > 0) {
                buttons[picks[0] - 1].classList.add('selected');
            }
            if (picks.length > 1) {
                buttons[picks[1] - 1].classList.add('selected');
            }
        }

        function resetSelection() {
            picks = [];
            document.getElementById('c2').textContent = '?';
            document.getElementById('c3').textContent = '?';
            buildNumpad();
        }

        function checkAnswer() {
            if (picks.length < 2) {
                return;
            }

            const correct = picks[0] * picks[1] === target;
            if (correct) {
                clearInterval(timerInterval);
                score++;
                document.getElementById('scoreVal').textContent = score;
                showResultPopup('✅ Benar!', '#10b981');
                spawnEmojis('🎉', 20);
                setTimeout(generateProblem, 2000);
            } else {
                showResultPopup('❌ Salah!', '#ef4444');
                spawnEmojis('❌', 12);
                document.getElementById('c2').classList.add('shake');
                document.getElementById('c3').classList.add('shake');
                setTimeout(() => {
                    document.getElementById('c2').classList.remove('shake');
                    document.getElementById('c3').classList.remove('shake');
                    picks = [];
                    document.getElementById('c2').textContent = '?';
                    document.getElementById('c3').textContent = '?';
                    buildNumpad();
                }, 500);
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                const percentage = (timeLeft / 30) * 100;
                document.getElementById('timerBar').style.width = percentage + '%';
                document.getElementById('timerText').textContent = timeLeft + 's';

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showResultPopup('⏰ Waktu Habis!', '#ef4444');
                    spawnEmojis('⏰', 15);
                    setTimeout(generateProblem, 2000);
                }
            }, 1000);
        }

        function showResultPopup(message, bgColor) {
            const popup = document.getElementById('resultPopup');
            popup.textContent = message;
            popup.style.background = bgColor;
            popup.style.display = 'block';
            popup.classList.remove('hide');
            popup.classList.add('show');

            setTimeout(() => {
                popup.classList.remove('show');
                popup.classList.add('hide');
                setTimeout(() => {
                    popup.style.display = 'none';
                }, 500);
            }, 1500);
        }

        function spawnEmojis(emoji, count) {
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'emoji-float';
                el.textContent = emoji;
                el.style.left = Math.random() * 90 + '%';
                el.style.top = 20 + Math.random() * 60 + '%';
                el.style.animationDelay = Math.random() * 0.6 + 's';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 2500);
            }
        }

        function resetGame() {
            score = 0;
            document.getElementById('scoreVal').textContent = '0';
            generateProblem();
        }

        // Start the game
        generateProblem();
    </script>
