  <div class="container">

    <h2>Soal 6</h2>

    <div class="soal">
      Informasi apa saja yang dapat diketahui melalui sebuah peta?
      <br>
      <b>(Jawaban lebih dari satu)</b>
    </div>

    <div class="pilihan">

      <label>
        <input type="checkbox" name="jawaban" value="1">
        Letak pegunungan dan dataran rendah
      </label>

      <label>
        <input type="checkbox" name="jawaban" value="2">
        Nama wilayah atau daerah tertentu
      </label>

      <label>
        <input type="checkbox" name="jawaban" value="3">
        Harga barang di suatu kota
      </label>

      <label>
        <input type="checkbox" name="jawaban" value="4">
        Arah dan posisi suatu tempat
      </label>

    </div>

    <button onclick="periksaJawaban()">
      Periksa Jawaban
    </button>

    <div id="hasil"></div>

  </div>

  <script>

    function periksaJawaban(){

      let jawaban =
        document.querySelectorAll('input[name="jawaban"]:checked');

      let hasil =
        document.getElementById("hasil");

      if(jawaban.length === 0){

        hasil.innerHTML =
          "⚠️ Pilih jawaban terlebih dahulu!";

        hasil.className = "salah";

        return;
      }

      let pilihan = [];

      jawaban.forEach(function(item){
        pilihan.push(item.value);
      });

      let benar =
        pilihan.includes("1") &&
        pilihan.includes("2") &&
        pilihan.includes("4") &&
        !pilihan.includes("3");

      if(benar){

        hasil.innerHTML =
          "✅ Jawaban benar! Peta dapat menunjukkan letak wilayah, kondisi permukaan bumi, arah, dan posisi suatu tempat.";

        hasil.className = "benar";

      } else {

        hasil.innerHTML =
          "❌ Jawaban kurang tepat. Coba periksa kembali informasi yang dapat ditemukan pada peta.";

        hasil.className = "salah";
      }

    }

  </script>
