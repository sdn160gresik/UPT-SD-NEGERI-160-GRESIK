            <img src="https://i.imgur.com/S1MM4DY.png" alt="Alat Musik 1">

    <p>
        Jelaskan perbedaan kedua alat musik pada gambar di atas!
    </p>

    <textarea placeholder="Tuliskan jawabanmu di sini..."></textarea>

    <button onclick="kirimJawaban()">
        Kirim Jawaban
    </button>

    <div id="hasil"></div>

</div>

<script>
function kirimJawaban(){

    let jawaban = document.querySelector("textarea").value.trim();

    let hasil = document.getElementById("hasil");

    if(jawaban === ""){
        hasil.innerHTML = "⚠️ Jawaban belum diisi!";
        hasil.style.color = "red";
    }else{
        hasil.innerHTML = "✅ Jawaban berhasil dikirim!";
        hasil.style.color = "green";
    }
}
</script>
