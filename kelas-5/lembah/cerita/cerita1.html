<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soal Cerita 1 Lengkap</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0}
header{background:#1976d2;color:#fff;padding:16px;text-align:center;font-size:28px;font-weight:bold}
.container{max-width:1000px;margin:20px auto;padding:15px}
.card{background:#fff;border-radius:15px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
img{width:100%;max-height:700px;object-fit:contain;border-radius:10px}
input{width:100%;padding:12px;font-size:18px;margin-top:12px;border-radius:8px;border:1px solid #ccc}
.buttons{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:15px}
button{padding:12px 18px;border:none;border-radius:8px;cursor:pointer}
.page{text-align:center;font-weight:bold;margin-top:10px}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:30px;border-radius:20px;box-shadow:0 0 25px rgba(0,0,0,.3);z-index:9999;text-align:center;min-width:300px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9998}
</style>
</head>
<body>
<header>📚 SOAL CERITA BERGAMBAR 📚</header>
<div class="container">
<div class="card">
<h2 id="judul"></h2>
<img id="gambar">
<input id="jawaban" placeholder="Masukkan jawaban">
<div class="buttons">
<button onclick="cek()">✔ Cek Jawaban</button>
<button onclick="kunci()">🔑 Kunci Jawaban</button>
<button onclick="prev()">⬅ Sebelumnya</button>
<button onclick="next()">➡ Berikutnya</button>
</div>
<div class="page" id="page"></div>
</div>
</div>
<script>
const soal=[
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/1.jpg","136"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/2.jpg","71"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/3.jpg","80"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/4.jpg","275"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/5.jpg","67"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/6.jpg","372"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/7.jpg","57"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/8.jpg","113"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/9.jpg","455"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/10.jpg","139"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/11.jpg","109"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/12.jpg","211"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/13.jpg","135000"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/14.jpg","357"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/15.jpg","750"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/16.jpg","175"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/17.jpg","170"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/18.jpg","145"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/19.jpg","335"],
["https://raw.githubusercontent.com/sdn160gresik/komik/main/soal-cerita/s-1/20.jpg","67"]
];
let i=0,skor=0,benar=0,salah=0;
let dinilai=new Array(20).fill(false);
function tampil(){judul.textContent='Soal '+(i+1);gambar.src=soal[i][0];page.textContent=`Halaman ${i+1} dari 20`;jawaban.value='';}
function popup(j,p){
let o=document.createElement('div');o.className='overlay';o.id='ov';
let d=document.createElement('div');d.className='popup';d.id='pp';
d.innerHTML=`<h1>${j}</h1><p>${p}</p><button onclick="tutup()">Lanjut ➜</button>`;
document.body.append(o,d);
}
function tutup(){ov.remove();pp.remove();}
function cek(){
if(dinilai[i]) return alert('Soal sudah dinilai');
if(jawaban.value.trim()===soal[i][1]){skor+=5;benar++;popup('🎉 Hebat!','Jawabanmu BENAR! ✅<br>+5 poin 🌟');}
else{salah++;popup('😊 Tetap Semangat!','Jawaban belum tepat ❌<br>Coba lagi di soal berikutnya 📚');}
dinilai[i]=true;
}
function kunci(){

    if(!dinilai[i]){
        popup(
            '🌟 Ayo Semangat! 🌟',
            'Kamu belum menjawab soal ini 😊<br><br>' +
            'Ayo coba kerjakan terlebih dahulu! 💪📚<br>' +
            'Setiap jawaban adalah langkah menuju keberhasilan. 🚀✨<br><br>' +
            'Tekan tombol <b>Cek Jawaban</b> setelah mengerjakan, lalu kunci jawaban akan terbuka. 🔑🎉'
        );
        return;
    }

    popup(
        '🔑 Kunci Jawaban',
        'Jawaban yang benar adalah:<br><br><h2>' + soal[i][1] + '</h2>'
    );
}
function prev(){if(i>0){i--;tampil();}}
function next(){
if(i<19){i++;tampil();return;}
let kategori=skor>=90?'Istimewa':skor>=80?'Sangat Baik':skor>=70?'Baik':skor>=60?'Cukup':'Perlu Belajar Lagi';
document.body.innerHTML=`<div style="display:flex;justify-content:center;align-items:center;height:100vh">
<div style="background:white;padding:40px;border-radius:20px;text-align:center;box-shadow:0 0 20px rgba(0,0,0,.2)">
<h1>🏆 SELAMAT! 🏆</h1>
<h2>Kuis Selesai 🎉</h2>
<p>✅ Benar: ${benar}</p>
<p>❌ Salah: ${salah}</p>
<h1>🌟 Nilai Akhir: ${skor} 🌟</h1>
<h3>${kategori}</h3>
<p>Terus semangat belajar! 🚀📚</p>
<button onclick="location.reload()">🔄 Main Lagi</button>
</div></div>`;
}
tampil();
</script>
</body>
</html>
