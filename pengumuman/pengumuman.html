<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fb;
    padding:30px;
}

.pengumuman{
    max-width:900px;
    margin:auto;
}

.judul{
    text-align:center;
    color:#0d47a1;
    font-size:34px;
    margin-bottom:10px;
}

.subjudul{
    text-align:center;
    color:#666;
    margin-bottom:35px;
}

.menu{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{
    background:#fff;
    border-radius:18px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.3s;
    text-align:center;
}

.card:hover{
    transform:translateY(-6px);
}

.icon{
    font-size:60px;
    margin-bottom:15px;
}

.card h3{
    color:#0d47a1;
    margin-bottom:10px;
}

.card p{
    color:#555;
    line-height:1.7;
    margin-bottom:20px;
}

.btn{
    display:inline-block;
    padding:14px 28px;
    background:linear-gradient(135deg,#1976d2,#42a5f5);
    color:#fff;
    text-decoration:none;
    border-radius:35px;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 8px 20px rgba(25,118,210,.35);
}

.badge{
    display:inline-block;
    margin-top:10px;
    background:#ff9800;
    color:#fff;
    padding:5px 12px;
    border-radius:30px;
    font-size:12px;
}

@media(max-width:768px){

body{
    padding:15px;
}

.judul{
    font-size:28px;
}

}
</style>
</head>

<body>

<section class="pengumuman">

<h1 class="judul">📢 Pengumuman</h1>

<p class="subjudul">
Silakan pilih menu sesuai kebutuhan Anda.
</p>

<div class="menu">

<!-- Menu 1 -->
<div class="card">

<div class="icon">📝</div>

<h3>Ekstrakurikuler</h3>

<p>
Pendaftaran peserta didik untuk mengikuti
Ekstrakurikuler.
</p>

<a href="https://docs.google.com/forms/d/e/1FAIpQLScP0zw373XI43C3hljD2xWxhbqA7dAzZWlTNs4KovG_rzEWuA/alreadyresponded"
target="_blank"
class="btn">
📝 Isi Formulir
</a>

</div>

<!-- Menu 2 -->
<div class="card">

<div class="icon">📋</div>

<h3>Data CKG SD</h3>

<p>
Kepada Bapak/Ibu Wali murid dimohon mengisi
Data CKG SD dengan lengkap dan benar.
</p>

<a href="https://forms.gle/MU9N8y8ZMX4VcqkG6"
target="_blank"
class="btn">
📄 Isi Data CKG SD
</a>

<div class="badge">Baru</div>

</div>

</div>

</section>

</body>
</html>
