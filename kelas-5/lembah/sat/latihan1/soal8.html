<head>
  <meta charset="UTF-8">

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      margin:0;
      padding:20px;
    }

    .nav-soal{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:25px;
    }

    .nav-soal a{
      width:45px;
      height:45px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      background:#3498db;
      color:white;
      border-radius:8px;
      font-weight:bold;
      transition:0.3s;
    }

    .nav-soal a:hover{
      background:#2980b9;
    }

    .nav-soal a.active{
      background:#27ae60;
      pointer-events:none;
    }

    .container{
      background:white;
      padding:25px;
      border-radius:12px;
      max-width:800px;
      margin:auto;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2{
      margin-top:0;
    }

    p{
      font-size:18px;
      line-height:1.8;
    }

    .soal{
      background:#f9f9f9;
      padding:20px;
      border-left:5px solid #3498db;
      border-radius:8px;
      margin:20px 0;
      font-size:22px;
      text-align:center;
      font-weight:bold;
    }

    .pilihan{
      margin-top:20px;
    }

    .pilihan label{
      display:block;
      margin-bottom:15px;
      font-size:18px;
      cursor:pointer;
      line-height:1.8;
    }

    input[type="radio"]{
      transform:scale(1.2);
      margin-right:10px;
    }

    button{
      margin-top:25px;
      padding:12px 20px;
      background:#27ae60;
      color:white;
      border:none;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#1e8449;
    }

    #hasil{
      margin-top:20px;
      font-size:18px;
      font-weight:bold;
    }

    .benar{
      color:green;
    }

    .salah{
      color:red;
    }

    .tombol-kembali{
      display:inline-block;
      margin-top:-5px;
      margin-bottom:20px;
      padding:10px 18px;
      background:#e67e22;
      color:white;
      text-decoration:none;
      border-radius:8px;
      font-weight:bold;
      transition:0.3s;
    }

    .tombol-kembali:hover{
      background:#ca6f1e;
    }

  </style>
</head>

<body>

  <!-- Navigasi Soal -->
  <div class="nav-soal">

    <a href="soal15.html">15</a>

  <a href="../sas.html" class="tombol-kembali">
    ← Kembali
  </a>

  <div class="container">

    <h2>Soal 8</h2>

    <p>
      Perhatikan kedua bilangan berikut!
    </p>

    <div class="soal">
      74.325 ............ 74.512
    </div>

    <p>
      Tanda perbandingan yang tepat pada dua bilangan tersebut yaitu...
    </p>

    <div class="pilihan">

      <label>
        <input type="radio" name="jawaban" value="a">
        a. >
      </label>

      <label>
        <input type="radio" name="jawaban" value="b">
        b. <
      </label>

      <label>
        <input type="radio" name="jawaban" value="c">
        c. =
      </label>

      <label>
        <input type="radio" name="jawaban" value="d">
        d. ≥
      </label>

    </div>

    <button onclick="periksaJawaban()">
      Periksa Jawaban
    </button>

    <div id="hasil"></div>

  </div>

  <script>

    function periksaJawaban(){

      let jawaban =
        document.querySelector('input[name="jawaban"]:checked');

      let hasil =
        document.getElementById("hasil");

      if(!jawaban){

        hasil.innerHTML =
          "⚠️ Pilih salah satu jawaban terlebih dahulu!";

        hasil.className = "salah";

        return;
      }

      if(jawaban.value === "b"){

        hasil.innerHTML =
          "✅ Jawaban benar! Karena 74.325 lebih kecil dari 74.512.";

        hasil.className = "benar";

      } else {

        hasil.innerHTML =
          "❌ Jawaban salah. Jawaban yang benar adalah <";

        hasil.className = "salah";
      }
    }

  </script>

</body>
