  <div class="container">

    <h2>Soal 2</h2>

    <p>Data Berat Badan Siswa Kelas V</p>

    <table>
      <tr>
        <th>Berat Badan (kg)</th>
        <th>Banyak Siswa</th>
      </tr>
      <tr><td>30</td><td>8</td></tr>
      <tr><td>32</td><td>7</td></tr>
      <tr><td>34</td><td>9</td></tr>
      <tr><td>36</td><td>5</td></tr>
      <tr><td>38</td><td>6</td></tr>
      <tr><td>40</td><td>5</td></tr>
    </table>

    <p><b>Jumlah seluruh siswa adalah …</b></p>

    <div class="pilihan">
      <label><input type="radio" name="jawaban" value="A"> a. 38</label><br>
      <label><input type="radio" name="jawaban" value="B"> b. 39</label><br>
      <label><input type="radio" name="jawaban" value="C"> c. 40</label><br>
      <label><input type="radio" name="jawaban" value="D"> d. 41</label><br>
    </div>

    <button onclick="periksaJawaban()">Periksa Jawaban</button>

    <div id="hasil"></div>

  </div>

  <script>
    function periksaJawaban(){
      let jawaban =
        document.querySelector('input[name="jawaban"]:checked');

      let hasil = document.getElementById("hasil");

      if(!jawaban){
        hasil.innerHTML = "⚠️ Pilih jawaban terlebih dahulu!";
        hasil.className = "salah";
        return;
      }

      if(jawaban.value === "C"){
        hasil.innerHTML = "✅ Jawaban benar! Jumlah siswa = 40.";
        hasil.className = "benar";
      } else {
        hasil.innerHTML = "❌ Jawaban salah. Coba lagi!";
        hasil.className = "salah";
      }
    }
  </script>
