<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kontak - UPT SD NEGERI 160 GRESIK</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      margin: 0;
      background-color: #f2f7fb;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background-color: #007bff;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .logo {
      height: 50px;
    }

    .judul {
      flex: 1;
      text-align: center;
    }

    .judul h1 {
      font-size: 1.8em;
      margin: 0;
      font-weight: bold;
    }

    .judul p {
      margin: 5px 0 0;
      font-size: 1.2em;
    }

    nav {
      background-color: #0056b3;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 10px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 8px 12px;
    }

    nav a:hover {
      background-color: #003f80;
    }

    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #007bff;
      min-width: 160px;
      top: 100%;
      left: 0;
      z-index: 999;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .dropdown-content a {
      display: block;
      padding: 10px;
      color: white;
      text-decoration: none;
    }

    .dropdown-content a:hover {
      background-color: #004080;
    }

    .hero {
      text-align: center;
      padding: 30px 15px;
    }

    .konten {
      max-width: 900px;
      margin: auto;
      padding: 10px;
    }

    iframe {
      width: 100%;
      height: 1100px;
      border: none;
    }

    @media (max-width: 600px) {
      .logo {
        height: 40px;
      }

      .judul h1 {
        font-size: 1.4em;
      }

      .judul p {
        font-size: 1em;
      }

      nav {
        flex-direction: column;
        align-items: center;
      }

      .dropdown-content {
        position: static;
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
