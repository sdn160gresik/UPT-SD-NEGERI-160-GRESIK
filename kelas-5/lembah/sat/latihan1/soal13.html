/* ========================= */
/* Gambar Bangun Datar */
/* ========================= */

.gambar{
    text-align:center;
    margin:20px 0 40px;
}

.gambar h1{
    font-size:32px;
    margin-bottom:30px;
    font-family:"Times New Roman", serif;
}

.bangun-container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:60px;
    flex-wrap:wrap;
}

.box{
    width:320px;
}

.title{
    background:black;
    color:white;
    padding:12px;
    font-size:24px;
    font-weight:bold;
    margin-bottom:25px;
}

.persegi-panjang{
    width:280px;
    height:160px;
    border:6px solid black;
    margin:auto;
    position:relative;
    background:white;
}

/* tanda siku */
.corner{
    width:14px;
    height:14px;
    border-top:4px solid black;
    border-left:4px solid black;
    position:absolute;
}

.tl{
    top:6px;
    left:6px;
}

.tr{
    top:6px;
    right:6px;
    transform:rotate(90deg);
}

.bl{
    bottom:6px;
    left:6px;
    transform:rotate(-90deg);
}

.br{
    bottom:6px;
    right:6px;
    transform:rotate(180deg);
}

/* tanda sisi sama */
.mark-horizontal{
    width:2px;
    height:18px;
    background:black;
    position:absolute;
    left:50%;
    transform:translateX(-50%);
}

.top-mark{
    top:-10px;
}

.bottom-mark{
    bottom:-10px;
}

.mark-vertical{
    width:18px;
    height:2px;
    background:black;
    position:absolute;
    top:50%;
    transform:translateY(-50%);
}

.left-mark1{
    left:-10px;
}

.left-mark2{
    left:-4px;
}

.right-mark1{
    right:-10px;
}

.right-mark2{
    right:-4px;
}

.persegi{
    width:160px;
    height:160px;
    border:6px solid black;
    margin:30px auto;
    background:white;
}

.divider{
    width:3px;
    height:300px;
    background:black;
    margin-top:50px;
}

/* ========================= */

.pilihan{
    margin-top:20px;
}

.pilihan label{
    display:block;
    background:#f9f9f9;
    padding:14px;
    border-radius:8px;
    margin-bottom:12px;
    cursor:pointer;
    border:1px solid #ddd;
    transition:0.3s;
}

.pilihan label:hover{
    background:#eaf4ff;
}

input[type="radio"]{
    margin-right:10px;
}

button{
    margin-top:20px;
    padding:12px 20px;
    background:#27ae60;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1e8449;
}

#hasil{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}

.benar{
    color:green;
}

.salah{
    color:red;
}

.tombol-kembali{
    display:inline-block;
    margin-top:-5px;
    margin-bottom:20px;
    padding:10px 18px;
    background:#e67e22;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.tombol-kembali:hover{

}

<div class="container">

    <h2>Soal 13</h2>

    <p>
        Cermati dua bangun datar berikut, kemudian tentukan persamaan sifat yang dimiliki keduanya!
    </p>

    <!-- Gambar Diganti Menjadi HTML -->
    <div class="gambar">

        <h1>Perhatikan gambar bangun datar di bawah ini</h1>

        <div class="bangun-container">

            <!-- Persegi Panjang -->
            <div class="box">

                <div class="title">
                    Persegi Panjang
                </div>

                <div class="persegi-panjang">

                    <!-- siku -->
                    <div class="corner tl"></div>
                    <div class="corner tr"></div>
                    <div class="corner bl"></div>
                    <div class="corner br"></div>

                    <!-- tanda sisi -->
                    <div class="mark-horizontal top-mark"></div>
                    <div class="mark-horizontal bottom-mark"></div>

                    <div class="mark-vertical left-mark1"></div>
                    <div class="mark-vertical left-mark2"></div>

                    <div class="mark-vertical right-mark1"></div>
                    <div class="mark-vertical right-mark2"></div>

                </div>
            </div>

            <!-- Garis Pembatas -->
            <div class="divider"></div>

            <!-- Persegi -->
            <div class="box">

                <div class="title">
                    Persegi
                </div>

                <div class="persegi"></div>

            </div>

        </div>

    </div>

    <div class="pilihan">

        <label>
            <input type="radio" name="jawaban" value="A">
            A. Kedua bangun mempunyai empat sisi dengan panjang yang sama
        </label>

        <label>
            <input type="radio" name="jawaban" value="B">
            B. Kedua bangun memiliki empat simetri putar
        </label>

        <label>
            <input type="radio" name="jawaban" value="C">
            C. Kedua bangun mempunyai empat garis diagonal
        </label>

        <label>
            <input type="radio" name="jawaban" value="D">
            D. Kedua bangun sama-sama mempunyai empat sudut siku-siku
        </label>

    </div>

    <button onclick="periksaJawaban()">
        Periksa Jawaban
    </button>

    <div id="hasil"></div>

</div>

<script>
function periksaJawaban(){

    const jawabanBenar = "D";

    let jawaban = document.querySelector('input[name="jawaban"]:checked');

    let hasil = document.getElementById("hasil");

    if(!jawaban){
        hasil.innerHTML = "⚠️ Pilih salah satu jawaban terlebih dahulu!";
        hasil.className = "salah";
        return;
    }

    if(jawaban.value === jawabanBenar){
        hasil.innerHTML = "✅ Jawaban benar!";
        hasil.className = "benar";
    }else{
        hasil.innerHTML = "❌ Jawaban masih kurang tepat!";
        hasil.className = "salah";
    }
}
</script>
