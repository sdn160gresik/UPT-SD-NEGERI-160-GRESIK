
<!doctype html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komik Viewer</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <style>
        .home-btn{
    position:fixed;
    top:15px;
    left:15px;
    width:55px;
    height:55px;
    border-radius:50%;
    background:#22c55e;
    color:white;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    box-shadow:0 4px 15px rgba(0,0,0,.3);
    z-index:9999;
    transition:.3s;
}

.home-btn:hover{
    transform:scale(1.1);
    background:#16a34a;
}
        * {
            font-family: 'Quicksand', sans-serif;
        }

        html,
        body,
        #app {
            height: 100%;
            width: 100%;
            margin: 0;
        }

        body {
            overflow: hidden;
        }

        .comic-container {
            perspective: 1200px;
            position: relative;
        }

        #comic-img {
            display: block;
            max-height: 100%;
            max-width: 100%;
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            transition: all 0.8s ease;
            opacity: 1;
            object-fit: contain;
        }

        #comic-img.fade-out {
            opacity: 0;
        }

        #left-zone,
        #right-zone {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            z-index: 10;
            cursor: pointer;
        }

        #left-zone {
            left: 0;
        }

        #right-zone {
            right: 0;
        }

        #left-zone:hover,
        #right-zone:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        #left-zone::after,
        #right-zone::after {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 48px;
            color: rgba(255, 255, 255, 0.7);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #left-zone::after {
            content: "❮";
            left: 20px;
        }

        #right-zone::after {
            content: "❯";
            right: 20px;
        }

        #left-zone:hover::after,
        #right-zone:hover::after {
            opacity: 1;
        }

        #page-info {
            color: #9ca3af;
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <a href="../komik.html" class="home-btn">🏠</a>
    <div id="app"
        class="h-full w-full bg-gray-900 flex flex-col items-center justify-center overflow-hidden relative select-none">

        <div class="comic-container relative flex items-center justify-center w-full"
            style="height:80%; max-width:50.4%;">

            <div id="left-zone"></div>
            <div id="right-zone"></div>

            <img id="comic-img" src="" alt="Komik">
        </div>

        <p id="page-info"></p>
    </div>

    <script>
        const images = [
            "https://raw.githubusercontent.com/sdn160gresik/komik/main/ipas/rahasia rantai makanan/judul.jpg",
            "https://raw.githubusercontent.com/sdn160gresik/komik/main/ipas/rahasia rantai makanan/1.jpg",
            "https://raw.githubusercontent.com/sdn160gresik/komik/main/ipas/rahasia rantai makanan/2.jpg",
            "https://raw.githubusercontent.com/sdn160gresik/komik/main/ipas/rahasia rantai makanan/3.jpg",
            "https://raw.githubusercontent.com/sdn160gresik/komik/main/ipas/rahasia rantai makanan/4.jpg",
            "https://raw.githubusercontent.com/sdn160gresik/komik/main/ipas/rahasia rantai makanan/5.jpg",
            "https://raw.githubusercontent.com/sdn160gresik/komik/main/ipas/rahasia rantai makanan/6.jpg",
            "https://raw.githubusercontent.com/sdn160gresik/komik/main/ipas/rahasia rantai makanan/7.jpg",
            "https://raw.githubusercontent.com/sdn160gresik/komik/main/ipas/rahasia rantai makanan/8.jpg",
            "https://raw.githubusercontent.com/sdn160gresik/komik/main/ipas/rahasia rantai makanan/9.jpg",
                      "https://raw.githubusercontent.com/sdn160gresik/komik/main/ipas/rahasia rantai makanan/tamat.jpg"
        ];

        let current = 0;
        let isAnimating = false;

        const img = document.getElementById("comic-img");
        const info = document.getElementById("page-info");

        function loadImage() {
            img.classList.remove("fade-out");
            img.src = images[current];
            info.textContent = `Halaman ${current + 1} dari ${images.length}`;
            isAnimating = false;
        }

        function navigate(direction) {
            if (isAnimating) return;

            let nextPage;

            if (direction === "next") {
                nextPage = current + 1;
            } else {
                nextPage = current - 1;
            }

            if (nextPage < 0 || nextPage >= images.length) return;

            isAnimating = true;
            img.classList.add("fade-out");

            setTimeout(() => {
                current = nextPage;
                loadImage();
            }, 300);
        }

        loadImage();

        document.getElementById("right-zone").addEventListener("click", () => {
            navigate("next");
        });

        document.getElementById("left-zone").addEventListener("click", () => {
            navigate("prev");
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowRight") {
                navigate("next");
            }

            if (e.key === "ArrowLeft") {
                navigate("prev");
            }
        });

        img.addEventListener("click", () => {
            navigate("next");
        });
    </script>
</body>
</html>
