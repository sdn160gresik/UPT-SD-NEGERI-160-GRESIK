<!-- ...bagian atas tidak berubah... -->
<style>
  /* ... gaya umum tetap sama ... */
  
  .kegiatan-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 1200px;
    margin: auto;
  }

  .kegiatan-item {
    background: white;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    overflow: hidden;
    text-align: center;
    text-decoration: none;
    color: black;
    transition: transform 0.2s ease;
  }

  .kegiatan-item:hover {
    transform: scale(1.03);
  }

  .kegiatan-item img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    display: block;
  }

  .kegiatan-item p {
    margin: 10px;
    font-weight: bold;
    font-size: 1em;
    text-transform: capitalize;
  }

  @media (max-width: 600px) {
    .kegiatan-grid {
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }
    .kegiatan-item img {
      height: 120px;
    }
  }
</style>
