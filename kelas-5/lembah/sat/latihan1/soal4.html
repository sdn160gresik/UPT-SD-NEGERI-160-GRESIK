  <div class="container">

    <h2>Soal 4</h2>

    <p><b>Urutkan bilangan berikut dari yang terbesar!</b></p>

    <p>
      a. 750.000; 920.000; 610.000; 880.000<br>
      b. 905.120; 410.410; 780.780; 650.065<br>
      c. 320.032; 540.540; 275.275; 610.061
    </p>

    <p>Jawaban (urutkan masing-masing baris):</p>

    <p>a</p>
    <textarea id="a"></textarea>

    <p>b</p>
    <textarea id="b"></textarea>

    <p>c</p>
    <textarea id="c"></textarea>

    <button onclick="periksa()">Periksa Jawaban</button>

    <div id="hasil"></div>

  </div>

  <script>
    function periksa(){

      const jawabanBenar = {
        a: "920.000; 880.000; 750.000; 610.000",
        b: "905.120; 780.780; 650.065; 410.410",
        c: "610.061; 540.540; 320.032; 275.275"
      };

      let skor = 0;
      let total = 3;

      for(let k in jawabanBenar){
        let isi = document.getElementById(k).value.trim();

        if(isi === jawabanBenar[k]){
          skor++;
        }
      }

      let hasil = document.getElementById("hasil");

      if(skor === total){
        hasil.innerHTML = "✔ Semua jawaban benar!";
        hasil.className = "benar";
      } else {
        hasil.innerHTML = "✘ Masih ada jawaban yang salah. Skor: " + skor + "/" + total;
        hasil.className = "salah";
      }
    }
  </script>
