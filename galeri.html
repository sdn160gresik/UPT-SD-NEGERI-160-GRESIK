<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Galeri Sekolah - UPT SD NEGERI 160 GRESIK</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f2f2f2;
    }
    header {
      background: #0074d9;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    nav {
      background: #005bb5;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 0.5rem 0;
    }
    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .judul {
      text-align: center;
      margin: 2rem 1rem 0.5rem;
      font-size: 1.2rem;
      color: #333;
    }

    .kegiatan-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .kegiatan-item {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      text-align: center;
      text-decoration: none;
      color: black;
      transition: transform 0.2s ease;
    }

    .kegiatan-item:hover {
      transform: scale(1.03);
    }

    .kegiatan-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }

    .kegiatan-item p {
      margin: 10px;
      font-weight: bold;
      font-size: 1em;
      text-transform: capitalize;
    }

    @media (max-width: 600px) {
      .kegiatan-grid {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      }
      .kegiatan-item img {
        height: 120px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>UPT SD NEGERI 160 GRESIK</h1>
    <p>Galeri Sekolah</p>
  </header>

  <nav>
    <a href="index.html">Beranda</a>
    <a href="profil.html">Profil</a>
    <a href="guru.html">Guru & Staf</a>
    <a href="kelas1.html">Kelas</a>
    <a href="galeri.html">Galeri</a>
    <a href="kontak.html">Kontak</a>
  </nav>

  <div class="judul">Dokumentasi kegiatan dan momen spesial di SDN 160 Gresik</div>

  <div class="kegiatan-grid" id="galeriKegiatan"></div>

  <script>
    fetch('data-galeri.json')
      .then(res => res.json())
      .then(data => {
        const kontainer = document.getElementById("galeriKegiatan");
        for (const kegiatan in data) {
          const gambarPertama = data[kegiatan][0];
          const item = document.createElement("a");
          item.href = `kegiatan.html?kegiatan=${encodeURIComponent(kegiatan)}`;
          item.className = "kegiatan-item";
          item.innerHTML = `
            <img src="galeri/${kegiatan}/${gambarPertama}" alt="${kegiatan}">
            <p>${kegiatan}</p>
          `;
          kontainer.appendChild(item);
        }
      })
      .catch(err => {
        console.error("Gagal memuat galeri:", err);
        document.getElementById("galeriKegiatan").innerHTML = "<p style='text-align:center;'>Galeri tidak dapat dimuat.</p>";
      });
  </script>

</body>
</html>
