<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Buku Digital Koding dan Kecerdasan Artifisial">

    <meta name="theme-color" content="#07131d">

    <title>Koding dan Kecerdasan Artifisial</title>

    <!-- Favicon -->
    <link rel="icon" href="assets/icon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="book.css">

</head>

<body>

    <!-- =====================================================
         HUD CONTAINER
    ====================================================== -->

    <div class="hud-container">

    <div class="hud">

        <img
            src="assets/frame.png"
            class="hud-frame"
            alt="HUD Frame">

        <div class="hud-viewport">

            <main id="book"></main>

            <div class="navigation">

                <button id="prevBtn" type="button">
                    ◀
                </button>

                <span id="pageIndicator">
                    1 / 1
                </span>

                <button id="nextBtn" type="button">
                    ▶
                </button>

            </div>

        </div>

    </div>

</div>

<div id="lightbox" class="lightbox">

    <span class="close">&times;</span>

    <img id="lightbox-image">

</div>

<script src="script.js"></script>

</body>

</html>
