    <p>
      Sebutkan 4 karakteristik bangun datar berikut!
    </p>

    <div class="gambar">
      <img src="https://i.imgur.com/YTxRhYU.png" alt="Bangun Datar Persegi Panjang">
    </div>

    <div class="jawaban">

      <textarea id="jawaban"
      placeholder="Tuliskan 4 karakteristik bangun datar tersebut di sini..."></textarea>

    </div>

    <button onclick="periksaJawaban()">
      Periksa Jawaban
    </button>

    <div id="hasil"></div>

  </div>

  <script>

function periksaJawaban(){

  let jawaban =
    document.getElementById("jawaban")
    .value.toLowerCase();

  let skor = 0;

  /* Kelompok jawaban mirip */
  const kelompokJawaban = [

    // Karakteristik 1
    [
      "empat sisi",
      "4 sisi",
      "memiliki 4 sisi"
    ],

    // Karakteristik 2
    [
      "sisi berhadapan sama panjang",
      "dua sisi sama panjang",
      "sisi yang berhadapan sama panjang"
    ],

    // Karakteristik 3
    [
      "dua pasang sisi sejajar",
      "sisi sejajar",
      "memiliki sisi sejajar"
    ],

    // Karakteristik 4
    [
      "sudut siku-siku",
      "sudut 90",
      "semua sudut 90 derajat",
      "keempat sudut siku-siku"
    ],

    // Karakteristik 5
    [
      "dua diagonal",
      "memiliki diagonal",
      "diagonal berpotongan",
      "diagonal saling berpotongan"
    ]

  ];

  /* Cek tiap kelompok */
  for(let i = 0; i < kelompokJawaban.length; i++){

    let ditemukan = false;

    for(let j = 0; j < kelompokJawaban[i].length; j++){

      if(jawaban.includes(kelompokJawaban[i][j])){
        ditemukan = true;
        break;
      }
    }

    if(ditemukan){
      skor++;
    }
  }

  let hasil =
    document.getElementById("hasil");

  if(skor >= 3){

    hasil.innerHTML =
      "✅ Jawaban bagus! Kamu berhasil menyebutkan karakteristik persegi panjang.";

    hasil.className = "benar";

  } else {

    hasil.innerHTML =
      "❌ Jawaban masih kurang lengkap. Coba sebutkan lagi ciri-ciri persegi panjang.";

    hasil.className = "salah";
  }
}

</script>
