<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perkalian Lingkaran</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Fredoka', sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #0f2744;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }

    h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 40px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      letter-spacing: 1px;
    }

    .circles-container {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .circle-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .circle {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 5px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3), inset -3px -3px 8px rgba(0, 0, 0, 0.2);
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s;
    }

    .circle::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, transparent 50%);
      pointer-events: none;
    }

    .circle:hover {
      transform: scale(1.05);
    }

    .circle-label {
      color: white;
      font-size: 0.9rem;
      opacity: 0.7;
      font-weight: 600;
    }

    .operator {
      color: white;
      font-size: 3rem;
      font-weight: bold;
      margin: 0 10px;
    }

    .instruction {
      color: white;
      font-size: 1.1rem;
      margin-bottom: 30px;
      opacity: 0.85;
      text-align: center;
    }

    .timer-container {
      width: 100%;
      max-width: 400px;
      margin-bottom: 30px;
      padding: 0 20px;
    }

    .timer-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      color: white;
      font-size: 0.95rem;
      opacity: 0.75;
      font-weight: 600;
    }

    .timer-text {
      color: #FACC15;
      font-weight: bold;
      font-size: 1.1rem;
    }

    .timer-bar-bg {
      width: 100%;
      height: 12px;
      background: #1e3a5f;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid white;
    }

    .timer-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #10b981 0%, #FACC15 50%, #ef4444 100%);
      transition: width 0.1s linear;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      gap: 12px;
      margin-bottom: 30px;
    }

    .num-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 24px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), inset -2px -2px 5px rgba(0, 0, 0, 0.3);
      color: white;
    }

    .num-btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, transparent 50%);
      pointer-events: none;
    }

    .num-btn:hover:not(.disabled) {
      transform: scale(1.15) translateY(-4px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5), inset -2px -2px 5px rgba(0, 0, 0, 0.3);
    }

    .num-btn.selected {
      transform: scale(1.3) translateY(-6px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), inset -3px -3px 8px rgba(0, 0, 0, 0.4);
    }

    .num-btn.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .btn-1 { background: linear-gradient(135deg, #FF6B6B 0%, #FF8E72 100%); }
    .btn-2 { background: linear-gradient(135deg, #FF9F5A 0%, #FF7A59 100%); }
    .btn-3 { background: linear-gradient(135deg, #FFD93D 0%, #FFC93A 100%); color: #1e3a5f; }
    .btn-4 { background: linear-gradient(135deg, #6BCB77 0%, #4A9D6F 100%); }
    .btn-5 { background: linear-gradient(135deg, #4D96FF 0%, #357ABD 100%); }
    .btn-6 { background: linear-gradient(135deg, #A78BFA 0%, #8B5CF6 100%); }
    .btn-7 { background: linear-gradient(135deg, #F472B6 0%, #EC4899 100%); }
    .btn-8 { background: linear-gradient(135deg, #22D3EE 0%, #0891B2 100%); }
    .btn-9 { background: linear-gradient(135deg, #FB923C 0%, #EA580C 100%); }

    .action-buttons {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .action-btn {
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      color: white;
    }

    .action-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    .reset-btn {
      background: #ef4444;
    }

    .check-btn {
      background: #3b82f6;
    }

    .new-btn {
      background: #FACC15;
      color: #1e3a5f;
    }

    .score-display {
      color: white;
      font-size: 1.3rem;
      font-weight: 600;
      margin-top: 20px;
    }

    .score-value {
      color: #FACC15;
      font-weight: bold;
    }

    .result-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 40px 60px;
      border-radius: 25px;
      font-size: 36px;
      font-weight: 700;
      text-align: center;
      z-index: 1000;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
      letter-spacing: 1px;
      display: none;
      color: white;
    }

    @keyframes popupShow {
      0% {
        transform: translate(-50%, -50%) scale(0.3) rotate(-15deg);
        opacity: 0;
      }
      50% {
        transform: translate(-50%, -50%) scale(1.15) rotate(8deg);
      }
      100% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    @keyframes popupHide {
      0% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(0.3) rotate(15deg);
        opacity: 0;
      }
    }

    .result-popup.show {
      animation: popupShow 0.5s ease;
    }

    .result-popup.hide {
      animation: popupHide 0.5s ease;
    }

    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translateY(-250px) scale(1.6) rotate(45deg);
      }
    }

    .emoji-float {
      position: fixed;
      font-size: 48px;
      pointer-events: none;
      animation: floatUp 2s ease-out forwards;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.15);
      }
    }

    .pulse {
      animation: pulse 0.6s ease;
    }

    @keyframes shake {
      0%, 100% {
        transform: translateX(0);
      }
      25% {
        transform: translateX(-10px);
      }
      75% {
        transform: translateX(10px);
      }
    }

    .shake {
      animation: shake 0.5s ease;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.8rem;
        margin-bottom: 30px;
      }

      .circles-container {
        gap: 10px;
      }

      .circle {
        width: 100px;
        height: 100px;
        font-size: 36px;
      }

      .operator {
        font-size: 2rem;
        margin: 0 5px;
      }

      .numpad {
        grid-template-columns: repeat(4, 50px);
        gap: 10px;
      }

      .num-btn {
        width: 50px;
        height: 50px;
        font-size: 18px;
      }

      .action-btn {
        padding: 10px 16px;
        font-size: 0.9rem;
      }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div id="app">
   <h1>Perkalian Lingkaran</h1>
   <div class="circles-container">
    <div class="circle-group">
     <div id="c1" class="circle"></div><span class="circle-label">Hasil</span>
    </div><span class="operator">=</span>
    <div class="circle-group">
     <div id="c2" class="circle"></div><span class="circle-label">Angka 1</span>
    </div><span class="operator">×</span>
    <div class="circle-group">
     <div id="c3" class="circle"></div><span class="circle-label">Angka 2</span>
    </div>
   </div>
   <p class="instruction">Pilih dua angka (2-9) yang menghasilkan bilangan di lingkaran!</p>
   <div class="timer-container">
    <div class="timer-label"><span>Waktu Tersisa</span> <span class="timer-text" id="timerText">30s</span>
    </div>
    <div class="timer-bar-bg">
     <div id="timerBar" class="timer-bar"></div>
    </div>
   </div>
   <div id="numpad" class="numpad"></div>
   <div class="action-buttons"><button class="action-btn reset-btn" onclick="resetSelection()">Ganti Jawaban ↺</button> <button class="action-btn check-btn" onclick="checkAnswer()">Cek Jawaban ✓</button> <button class="action-btn new-btn" onclick="resetGame()">Soal Baru 🔄</button>
   </div>
   <p class="score-display">Skor: <span class="score-value" id="scoreVal">0</span></p>
  </div>
  <div id="resultPopup" class="result-popup"></div>
  <script>
    let target = 0;
    let picks = [];
    let score = 0;
    let timerInterval = null;
    let timeLeft = 30;

    function generateProblem() {
      clearInterval(timerInterval);
      timeLeft = 30;
      document.getElementById('timerBar').style.width = '100%';

      const a = Math.floor(Math.random() * 8) + 2;
      const b = Math.floor(Math.random() * 8) + 2;
      target = a * b;

      picks = [];
      document.getElementById('c1').textContent = target;
      document.getElementById('c1').classList.add('pulse');
      setTimeout(() => document.getElementById('c1').classList.remove('pulse'), 600);

      document.getElementById('c2').textContent = '?';
      document.getElementById('c3').textContent = '?';

      updateCircleColors();
      buildNumpad();
      startTimer();
    }

    function updateCircleColors() {
      const resultColor = '#FF6B6B';
      const numberColor = '#4ECDC4';

      document.getElementById('c1').style.background = `linear-gradient(135deg, ${resultColor} 0%, ${adjustBrightness(resultColor, 20)} 100%)`;
      document.getElementById('c2').style.background = `linear-gradient(135deg, ${numberColor} 0%, ${adjustBrightness(numberColor, 20)} 100%)`;
      document.getElementById('c3').style.background = `linear-gradient(135deg, ${numberColor} 0%, ${adjustBrightness(numberColor, 20)} 100%)`;
    }

    function adjustBrightness(color, percent) {
      const num = parseInt(color.replace('#', ''), 16);
      const amt = Math.round(2.55 * percent);
      const R = (num >> 16) + amt;
      const G = ((num >> 8) & 0x00ff) + amt;
      const B = (num & 0x0000ff) + amt;
      return '#' + (0x1000000 + (R < 255 ? (R < 1 ? 0 : R) : 255) * 0x10000 + (G < 255 ? (G < 1 ? 0 : G) : 255) * 0x100 + (B < 255 ? (B < 1 ? 0 : B) : 255)).toString(16).slice(1);
    }

    function buildNumpad() {
      const pad = document.getElementById('numpad');
      pad.innerHTML = '';
      const colorClasses = ['btn-1', 'btn-2', 'btn-3', 'btn-4', 'btn-5', 'btn-6', 'btn-7', 'btn-8', 'btn-9'];

      for (let i = 1; i <= 9; i++) {
        const btn = document.createElement('button');
        btn.className = `num-btn ${colorClasses[i - 1]}`;
        btn.textContent = i;

        if (i === 1) {
          btn.classList.add('disabled');
        } else {
          btn.onclick = () => pickNum(i);
        }

        pad.appendChild(btn);
      }
    }

    function pickNum(n) {
      if (picks.length === 0) {
        picks.push(n);
        document.getElementById('c2').textContent = n;
        document.getElementById('c2').classList.add('pulse');
        setTimeout(() => document.getElementById('c2').classList.remove('pulse'), 600);
        updateButtonStates();
      } else if (picks.length === 1) {
        picks.push(n);
        document.getElementById('c3').textContent = n;
        document.getElementById('c3').classList.add('pulse');
        setTimeout(() => document.getElementById('c3').classList.remove('pulse'), 600);
        updateButtonStates();
      } else if (picks[0] === n) {
        picks[0] = n;
        document.getElementById('c2').textContent = n;
        document.getElementById('c2').classList.add('pulse');
        setTimeout(() => document.getElementById('c2').classList.remove('pulse'), 600);
      } else {
        picks[1] = n;
        document.getElementById('c3').textContent = n;
        document.getElementById('c3').classList.add('pulse');
        setTimeout(() => document.getElementById('c3').classList.remove('pulse'), 600);
        updateButtonStates();
      }
    }

    function updateButtonStates() {
      const buttons = document.querySelectorAll('.num-btn');
      buttons.forEach((btn) => {
        btn.classList.remove('selected');
      });

      if (picks.length > 0) {
        buttons[picks[0] - 1].classList.add('selected');
      }
      if (picks.length > 1) {
        buttons[picks[1] - 1].classList.add('selected');
      }
    }

    function resetSelection() {
      picks = [];
      document.getElementById('c2').textContent = '?';
      document.getElementById('c3').textContent = '?';
      buildNumpad();
    }

    function checkAnswer() {
      if (picks.length < 2) {
        return;
      }

      const correct = picks[0] * picks[1] === target;
      if (correct) {
        clearInterval(timerInterval);
        score++;
        document.getElementById('scoreVal').textContent = score;
        showResultPopup('✅ Benar!', '#10b981');
        spawnEmojis('🎉', 20);
        setTimeout(generateProblem, 2000);
      } else {
        showResultPopup('❌ Salah!', '#ef4444');
        spawnEmojis('❌', 12);
        document.getElementById('c2').classList.add('shake');
        document.getElementById('c3').classList.add('shake');
        setTimeout(() => {
          document.getElementById('c2').classList.remove('shake');
          document.getElementById('c3').classList.remove('shake');
          picks = [];
          document.getElementById('c2').textContent = '?';
          document.getElementById('c3').textContent = '?';
          buildNumpad();
        }, 500);
      }
    }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        const percentage = (timeLeft / 30) * 100;
        document.getElementById('timerBar').style.width = percentage + '%';
        document.getElementById('timerText').textContent = timeLeft + 's';

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          showResultPopup('⏰ Waktu Habis!', '#ef4444');
          spawnEmojis('⏰', 15);
          setTimeout(generateProblem, 2000);
        }
      }, 1000);
    }

    function showResultPopup(message, bgColor) {
      const popup = document.getElementById('resultPopup');
      popup.textContent = message;
      popup.style.background = bgColor;
      popup.style.display = 'block';
      popup.classList.remove('hide');
      popup.classList.add('show');

      setTimeout(() => {
        popup.classList.remove('show');
        popup.classList.add('hide');
        setTimeout(() => {
          popup.style.display = 'none';
        }, 500);
      }, 1500);
    }

    function spawnEmojis(emoji, count) {
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'emoji-float';
        el.textContent = emoji;
        el.style.left = Math.random() * 90 + '%';
        el.style.top = 20 + Math.random() * 60 + '%';
        el.style.animationDelay = Math.random() * 0.6 + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2500);
      }
    }

    function resetGame() {
      generateProblem();
    }

    // Start the game
    generateProblem();
  </script>
