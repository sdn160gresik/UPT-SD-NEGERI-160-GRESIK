<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:url('https://i.imgur.com/T7DDd3c.jpeg') no-repeat center center fixed;
background-size:cover;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:1rem 2rem;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.nav-left{
display:flex;
align-items:center;
gap:1rem;
}

.nav-right{
display:flex;
gap:0.5rem;
}

nav img{
height:55px;
}

nav a{
background:white;
padding:0.5rem 1rem;
border-radius:6px;
text-decoration:none;
color:#0288d1;
font-weight:bold;
}

/* JUDUL */

.title{
text-align:center;
margin-top:40px;
}

.title h1{
background:white;
display:inline-block;
padding:.5rem 1.5rem;
border-radius:12px;
color:#0288d1;
}

/* GRID GALERI */

.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:30px;
max-width:900px;
margin:auto;
}

.gallery-item{
background:white;
border-radius:15px;
padding:25px;
text-align:center;
color:#0288d1;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
text-decoration:none;
font-weight:bold;
font-size:1.1rem;
}

.gallery-item span{
font-size:2.5rem;
display:block;
margin-bottom:10px;
}

</style>

</head>
