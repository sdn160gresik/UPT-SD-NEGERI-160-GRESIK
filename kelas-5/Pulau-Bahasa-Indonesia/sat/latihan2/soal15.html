  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      margin:0;
      padding:20px;
    }

    .nav-soal{
      display:flex;
      flex-wrap:wrap;
      gap:10px;

    .nav-soal a{
      width:45px;
      height:45px;
      display:flex;

      background:#3498db;
      color:white;
      border-radius:8px;
      font-weight:bold;
      transition:0.3s;
    }

    .nav-soal a:hover{
      background:#2980b9;
    }

    /* Tombol soal aktif */
    .nav-soal a.active{
      background:#27ae60;
      pointer-events:none;
    }

    .container{
      background:white;
      padding:25px;
      border-radius:12px;
      max-width:1000px;
      margin:auto;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2{
      margin-top:0;
    }

    p{
      line-height:1.8;
      font-size:17px;
    }

    .gambar-soal{
      text-align:center;
      margin:25px 0;
    }

    .gambar-soal img{
      max-width:100%;
      width:420px;
      border-radius:12px;
      border:4px solid #3498db;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    .kotak-jawaban{
      margin-top:25px;
    }

    .kotak-jawaban label{
      display:block;
      font-size:18px;
      font-weight:bold;
      margin-bottom:10px;
      color:#2c3e50;
    }

    textarea{
      width:100%;
      min-height:120px;
      padding:15px;
      border-radius:12px;
      border:2px solid #3498db;
      font-size:16px;
      resize:vertical;
      box-sizing:border-box;
      margin-bottom:25px;
      line-height:1.6;
    }

    button{
      margin-top:10px;
      padding:12px 20px;
      background:#27ae60;
      color:white;
      border:none;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#1e8449;
    }

    #hasil{
      margin-top:20px;
      font-size:18px;
      font-weight:bold;
    }

    .benar{
      color:green;
    }

    .salah{
      color:red;
    }

    /* Tombol kembali */

    .tombol-kembali{
      display:inline-block;
      margin-top:-5px;
      margin-bottom:20px;
      padding:10px 18px;
      background:#e67e22;
      color:white;
      text-decoration:none;
      border-radius:8px;
      font-weight:bold;
      transition:0.3s;
    }

    .tombol-kembali:hover{
      background:#ca6f1e;
    }

  </style>

  <div class="container">

    <h2>Soal 15</h2>

    <p>
      Tulislah tanggapan dan saran sesuai dengan situasi yang ada pada gambar berikut!
    </p>

    <div class="gambar-soal">
      <img 
        src="https://i.imgur.com/F6hPzoK.png" 
        alt="Gambar situasi soal">
    </div>

    <div class="kotak-jawaban">

      <label for="tanggapan">
        Tanggapan :
      </label>

      <textarea 
        id="tanggapan"
        placeholder="Tuliskan tanggapanmu di sini..."></textarea>

      <label for="saran">
        Saran :
      </label>

      <textarea 
        id="saran"
        placeholder="Tuliskan saranmu di sini..."></textarea>

    </div>

    <button onclick="periksaJawaban()">
      Kirim Jawaban
    </button>

    <div id="hasil"></div>

  </div>

  <script>

    function periksaJawaban(){

      let tanggapan =
        document.getElementById("tanggapan").value.trim();

      let saran =
        document.getElementById("saran").value.trim();

      let hasil =
        document.getElementById("hasil");

      if(tanggapan === "" || saran === ""){

        hasil.innerHTML =
          "⚠️ Tanggapan dan saran harus diisi terlebih dahulu!";

        hasil.className = "salah";

      } else {

        hasil.innerHTML =
          "✅ Jawaban berhasil dikirim!";

        hasil.className = "benar";
      }
    }

  </script>
