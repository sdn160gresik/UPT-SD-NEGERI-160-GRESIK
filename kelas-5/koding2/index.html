<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="Buku Digital Koding dan Kecerdasan Artifisial">

    <title>Koding dan Kecerdasan Artifisial</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="book.css">

</head>

<body>

    <!-- ======================================================
         HUD CONTAINER
    ======================================================= -->

    <div class="hud-container">

        <div class="hud">

            <!-- FRAME -->

            <img
                src="assets/frame.png"
                class="hud-frame"
                alt="HUD Frame">

            <!-- VIEWPORT -->

            <div class="hud-viewport">

                <!-- BOOK -->

                <main id="book">

                    <!--
                        Semua halaman akan dimuat otomatis
                        dari folder pages/

                        page001.html
                        page002.html
                        page003.html
                        dst...
                    -->

                </main>

                <!-- NAVIGATION -->

                <div class="navigation">

                    <button
                        id="prevBtn"
                        type="button"
                        aria-label="Halaman Sebelumnya">

                        ◀

                    </button>

                    <span id="pageIndicator">

                        1 / 1

                    </span>

                    <button
                        id="nextBtn"
                        type="button"
                        aria-label="Halaman Berikutnya">

                        ▶

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- ======================================================
         LIGHTBOX
    ======================================================= -->

    <div id="lightbox"
         class="lightbox">

        <span class="close">

            &times;

        </span>

        <img
            id="lightbox-image"
            alt="Preview Gambar">

    </div>

    <!-- ======================================================
         LOADING (Opsional)
    ======================================================= -->

    <div id="loading"
         class="loading"
         hidden>

        Memuat halaman...

    </div>

    <!-- ======================================================
         SCRIPT
    ======================================================= -->

    <script src="script.js"></script>

</body>

</html>
