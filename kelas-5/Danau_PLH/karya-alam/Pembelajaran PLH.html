<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pembelajaran PLH</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass { background: rgba(255,255,255,0.12); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.2); }
    .card-hover { transition: transform 0.3s, box-shadow 0.3s; }
    .card-hover:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .panel-enter { animation: slideUp 0.35s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>

 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #4c1d95 0%, #1e3a8a 50%, #0f172a 100%);"><!-- Main Menu -->
   <div id="main-menu" class="flex flex-col items-center justify-center min-h-full px-4 py-12">
    <h1 id="title" class="text-4xl md:text-5xl font-800 text-white mb-4 text-center fade-in">Pembelajaran PLH</h1>
    <p class="text-purple-200 text-lg mb-12 fade-in">Pilih menu untuk memulai</p>
    <div class="flex flex-col sm:flex-row gap-6 fade-in">
<button onclick="window.location.href='../karya_alam.html'" class="glass card-hover rounded-2xl px-10 py-8 flex flex-col items-center gap-3 cursor-pointer min-w-[200px]"> 
<span class="text-5xl">📚</span> <span class="text-white font-700 text-xl">Materi</span> <span class="text-purple-200 text-sm"></span> </button> 
<button onclick="window.location.href='latihan/latihan-pewarna-tekstil.html'" class="glass card-hover rounded-2xl px-10 py-8 flex flex-col items-center gap-3 cursor-pointer min-w-[200px]"> 
<span class="text-5xl">✏️</span> <span class="text-white font-700 text-xl">Latihan</span> <span class="text-purple-200 text-sm"></span> </button>
    </div>
   </div><!-- Panel -->
   <div id="panel" class="hidden min-h-full flex flex-col items-center px-4 py-12">
    <div class="w-full max-w-2xl">
     <div class="flex items-center justify-between mb-8 panel-enter">
      <h2 id="panel-title" class="text-3xl font-700 text-white"></h2><button onclick="closePanel()" class="glass rounded-full px-5 py-2 text-white font-600 hover:bg-white/20 transition">✕ Tutup</button>
     </div>
     <div id="panel-content" class="grid gap-4"></div>
    </div>
   </div>
  </div>
  <script>
    const data = {
  materi: [],
  latihan: []
};

    
    // Element SDK
    const defaultConfig = {
      main_title: 'Pembelajaran PLH',
      background_color: '#4c1d95',
      surface_color: 'rgba(255,255,255,0.12)',
      text_color: '#ffffff',
      font_family: 'Plus Jakarta Sans',
      font_size: 16
    };

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const title = config.main_title || defaultConfig.main_title;
        document.getElementById('title').textContent = title;
        const font = config.font_family || defaultConfig.font_family;
        document.body.style.fontFamily = `${font}, sans-serif`;
        const size = config.font_size || defaultConfig.font_size;
        document.getElementById('title').style.fontSize = `${size * 2.5}px`;

        const bg = config.background_color || defaultConfig.background_color;
        document.getElementById('app').style.background = `linear-gradient(135deg, ${bg} 0%, #1e3a8a 50%, #0f172a 100%)`;

        const textColor = config.text_color || defaultConfig.text_color;
        document.getElementById('title').style.color = textColor;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['main_title', config.main_title || defaultConfig.main_title]
      ])
    });
  </script>
