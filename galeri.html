<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Galeri - UPT SD NEGERI 160 GRESIK</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: sans-serif;
      margin: 0;
      background-color: #f2f7fb;
    }
    header {
      background-color: #007bff;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { height: 50px; }
    .judul {
      text-align: center;
      flex: 1;
    }
    .judul h1 {
      margin: 0;
      font-size: 1.8em;
      font-weight: bold;
    }
    .judul p {
      margin: 5px 0 0;
      font-size: 1.2em;
    }
    nav {
      background-color: #0056b3;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 10px;
    }
    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 8px 12px;
    }
    nav a:hover {
      background-color: #003f80;
    }
    .dropdown {
      position: relative;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #007bff;
      min-width: 160px;
      top: 100%;
      left: 0;
      z-index: 999;
    }
    .dropdown:hover .dropdown-content {
      display: block;
    }
    .dropdown-content a {
      display: block;
      padding: 10px;
      color: white;
      text-decoration: none;
    }
    .dropdown-content a:hover {
      background-color: #004080;
    }

    .hero {
      text-align: center;
      padding: 20px;
    }

    .controls {
      text-align: center;
      margin-bottom: 20px;
    }

    .controls input, .controls select {
      padding: 8px;
      margin: 5px;
      font-size: 1em;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .kegiatan-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }
    .kegiatan-item {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      text-align: center;
      text-decoration: none;
      color: black;
    }
    .kegiatan-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }
    .kegiatan-item p {
      margin: 10px;
      font-weight: bold;
      font-size: 1.1em;
      text-transform: capitalize;
    }

    @media (max-width: 600px) {
      .logo { height: 40px; }
      .judul h1 { font-size: 1.4em; }
      .judul p { font-size: 1em; }
      nav { flex-direction: column; align-items: center; }
      .dropdown-content { position: static; width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

  <header>
    <img src="tutwuri.png" alt="Logo Tutwuri" class="logo" />
    <div class="judul">
      <h1>UPT SD NEGERI 160 GRESIK</h1>
      <p>Galeri Sekolah</p>
    </div>
    <img src="logo.png" alt="Logo Sekolah" class="logo" />
  </header>

  <nav>
    <a href="index.html">Beranda</a>
    <a href="profil.html">Profil</a>
    <a href="guru.html">Guru & Staf</a>
    <div class="dropdown">
      <a href="#">Kelas</a>
      <div class="dropdown-content">
        <a href="kelas1.html">Kelas 1</a>
        <a href="kelas2.html">Kelas 2</a>
        <a href="kelas3.html">Kelas 3</a>
        <a href="kelas4.html">Kelas 4</a>
        <a href="kelas5.html">Kelas 5</a>
        <a href="kelas6.html">Kelas 6</a>
      </div>
    </div>
    <a href="galeri.html">Galeri</a>
    <a href="kontak.html">Kontak</a>
  </nav>

  <section class="hero">
    <p>Dokumentasi kegiatan dan momen spesial di SDN 160 Gresik</p>
  </section>

  <section class="controls">
    <input type="text" id="pencarian" placeholder="Cari kegiatan..." />
    <select id="filterKategori">
      <option value="">Semua Kategori</option>
    </select>
  </section>

  <section class="kegiatan-grid" id="kegiatanGrid"></section>

  <script>
    let semuaData = {};

    fetch('data-galeri.json')
      .then(response => response.json())
      .then(data => {
        semuaData = data;
        tampilkanSemuaKegiatan(data);
        isiDropdown(data);
      });

    function tampilkanSemuaKegiatan(data) {
      const container = document.getElementById('kegiatanGrid');
      container.innerHTML = '';

      for (const folder in data) {
        const gambarPertama = data[folder][0];
        if (!gambarPertama) continue;

        const link = document.createElement('a');
        link.href = `kegiatan.html?kegiatan=${folder}`;
        link.className = 'kegiatan-item';
        link.setAttribute('data-nama', folder.toLowerCase());

        const img = document.createElement('img');
        img.src = `galeri/${folder}/${gambarPertama}`;
        img.alt = folder;

        const label = document.createElement('p');
        label.textContent = folder.replace(/-/g, ' ');

        link.appendChild(img);
        link.appendChild(label);
        container.appendChild(link);
      }
    }

    function isiDropdown(data) {
      const filter = document.getElementById('filterKategori');
      Object.keys(data).forEach(k => {
        const opt = document.createElement('option');
        opt.value = k;
        opt.textContent = k.replace(/-/g, ' ');
        filter.appendChild(opt);
      });
    }

    document.getElementById('pencarian').addEventListener('input', () => {
      const keyword = document.getElementById('pencarian').value.toLowerCase();
      document.querySelectorAll('.kegiatan-item').forEach(item => {
        const nama = item.getAttribute('data-nama');
        item.style.display = nama.includes(keyword) ? '' : 'none';
      });
    });

    document.getElementById('filterKategori').addEventListener('change', () => {
      const kategori = document.getElementById('filterKategori').value;
      tampilkanSemuaKegiatan(
        kategori ? { [kategori]: semuaData[kategori] } : semuaData
      );
    });
  </script>

</body>
</html>
