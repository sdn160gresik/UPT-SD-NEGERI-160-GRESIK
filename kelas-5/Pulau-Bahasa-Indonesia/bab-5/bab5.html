<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menjadi Warga Dunia</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet"/>

<style>
html, body{
  margin:0;
  padding:0;
  font-family:'Poppins',sans-serif;
  overflow-x:hidden;
  background:url('https://i.imgur.com/uXBnMk8.png') no-repeat center center fixed;
  background-size:cover;
}

/* Dropdown */
.challenge-container{
  text-align:center;
  margin-top:40px;
}
select{
  padding:12px 18px;
  border-radius:12px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

/* Overlay Coming Soon */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
  display:none;
}

.message-box{
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  position:relative;
  animation:floatUp 1s ease forwards, sparkle 2s infinite;
}

@keyframes floatUp{
  from{transform:translateY(80px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

@keyframes sparkle{
  0%{box-shadow:0 0 10px #fff;}
  50%{box-shadow:0 0 25px gold;}
  100%{box-shadow:0 0 10px #fff;}
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-3px);}
  50%{transform:translateX(3px);}
  75%{transform:translateX(-3px);}
  100%{transform:translateX(0);}
}

.shake{
  animation:shake 0.4s;
}

/* Maskot */
.mascot{
  font-size:60px;
  margin-bottom:10px;
  animation:bounce 1s infinite;
}
@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* Balon */
.balloon{
  position:fixed;
  bottom:-100px;
  width:40px;
  height:50px;
  border-radius:50%;
  animation:rise 6s linear forwards;
}
@keyframes rise{
  from{transform:translateY(0);}
  to{transform:translateY(-110vh);}
}

/* Konfeti */
.confetti{
  position:fixed;
  width:8px;
  height:8px;
  background:red;
  top:-10px;
  animation:fall 4s linear forwards;
}
@keyframes fall{
  to{transform:translateY(110vh);}
}

/* Firework */
.firework{
  position:fixed;
  width:10px;
  height:10px;
  background:yellow;
  border-radius:50%;
  animation:explode 1s ease-out forwards;
}
@keyframes explode{
  from{transform:scale(1);opacity:1;}
  to{transform:scale(8);opacity:0;}
}
</style>
</head>

<body>

<div class="challenge-container">
<select id="challengeSelect">
  <option value="">🚀 Pilih Tantangan Seru...</option>
  <option value="tantangan1.html">🌟 Tantangan 1</option>
  <option value="">📖 Tantangan 2 (Coming Soon)</option>
  <option value="tantangan3.html">✏️ Tantangan 3</option>
  <option value="">🧠 Tantangan 4 (Coming Soon)</option>
  <option value="tantangan5.html">🎯 Tantangan 5</option>
  <option value="">🌏 Tantangan 6 (Coming Soon)</option>
  <option value="tantangan7.html">🤝 Tantangan 7</option>
  <option value="">🌱 Tantangan 8 (Coming Soon)</option>
  <option value="tantangan9.html">🏆 Tantangan 9</option>
  <option value="">👑 Tantangan 10 (Coming Soon)</option>
</select>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="message-box shake" id="messageBox">
    <div class="mascot">🎮</div>
    <h2 id="animatedText"></h2>
  </div>
</div>

<!-- Musik -->
<audio id="bgMusic" src="suara/comingsoon.mp3"></audio>

<script>
const select = document.getElementById("challengeSelect");
const overlay = document.getElementById("overlay");
const textEl = document.getElementById("animatedText");
const music = document.getElementById("bgMusic");

select.addEventListener("change", function(){
  if(this.value){
    window.location.href = this.value;
  } else {
    showComingSoon();
  }
});

function showComingSoon(){
  overlay.style.display="flex";
  music.play();
  typeText("🎉 Maaf yaa... Tantangan ini masih dipersiapkan! Tunggu kejutan serunya segera hadir! 🎊");

  createBalloons();
  createConfetti();
  createFirework();

  setTimeout(()=>{
    overlay.style.display="none";
    music.pause();
    music.currentTime=0;
  },5000);
}

function typeText(text){
  textEl.innerHTML="";
  let i=0;
  const interval=setInterval(()=>{
    textEl.innerHTML+=text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(interval);
  },40);
}

function createBalloons(){
  const colors=["red","blue","green","orange","purple","pink"];
  for(let i=0;i<10;i++){
    const b=document.createElement("div");
    b.className="balloon";
    b.style.left=Math.random()*100+"%";
    b.style.background=colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),6000);
  }
}

function createConfetti(){
  for(let i=0;i<30;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"%";
    c.style.background=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

function createFirework(){
  const f=document.createElement("div");
  f.className="firework";
  f.style.top="40%";
  f.style.left="50%";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
}
</script>

</body>
</html>
