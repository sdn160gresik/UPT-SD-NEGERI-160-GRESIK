<div class="container">

  <h2>Soal 13</h2>

  <div class="teks">
    <strong>Pasangkanlah jenis pewarna berikut dengan contoh bahan yang tepat!</strong>
  </div>

  <table>
    <tr>
      <th>Jenis Pewarna</th>
      <th>Pilih Contoh Bahan</th>
    </tr>

<tr>
  <td>Pewarna alami</td>
  <td>

    <label>
      <input type="checkbox" name="alami" value="Ekstrak daun pandan">
      Ekstrak daun pandan
    </label><br>
    <label>
      <input type="checkbox" name="alami" value="Karamel">
      Karamel
    </label><br>
    <label>
      <input type="checkbox" name="alami" value="Sunset Yellow">
      Sunset Yellow
    </label><br>
    <label>
      <input type="checkbox" name="alami" value="Allura Red">
      Allura Red
    </label><br>
    <label>
      <input type="checkbox" name="alami" value="Buah naga">
      Pewarna dari buah naga
    </label>

  </td>
</tr>

<tr>








  <td>Pewarna buatan</td>
  <td>

<label>
      <input type="checkbox" name="buatan" value="Ekstrak daun pandan">
      Ekstrak daun pandan
    </label><br>
    <label>
      <input type="checkbox" name="buatan" value="Sunset Yellow">
      Sunset Yellow
    </label><br>
    <label>
      <input type="checkbox" name="buatan" value="Allura Red">
      Allura Red
    </label><br>
    <label>
      <input type="checkbox" name="buatan" value="Karamel">
      Karamel
    </label><br>
    <label>
      <input type="checkbox" name="buatan" value="Buah naga">
      Pewarna dari buah naga
    </label>

  </td>
</tr>


  </table>

  <button onclick="periksaJawaban()">
    Periksa Jawaban
  </button>

  <div id="hasil"></div>

</div>

<script>

function periksaJawaban(){

  let alami = document.querySelectorAll('input[name="alami"]:checked');
  let buatan = document.querySelectorAll('input[name="buatan"]:checked');

  let hasil = document.getElementById("hasil");

  let jawabanAlami = Array.from(alami).map(item => item.value);
  let jawabanBuatan = Array.from(buatan).map(item => item.value);

  if(jawabanAlami.length === 0 || jawabanBuatan.length === 0){

    hasil.innerHTML = "⚠️ Semua pilihan harus diisi!";
    hasil.className = "salah";
    return;
  }

  let benarAlami =
    jawabanAlami.includes("Ekstrak daun pandan") &&
    jawabanAlami.includes("Karamel");

  let benarBuatan =
    jawabanBuatan.includes("Sunset Yellow") &&
    jawabanBuatan.includes("Allura Red");

  if(benarAlami && benarBuatan){

    hasil.innerHTML =
    "✅ Jawaban benar!";

    hasil.className = "benar";

  } else {

    hasil.innerHTML =
    "❌ Jawaban masih kurang tepat. Coba lagi!";

    hasil.className = "salah";
  }

}

</script>
