  <div class="container">

    <h2>Soal 15</h2>

    <p>
      Hubungkan kata berimbuhan <b>pe-an</b> berikut
      dengan makna yang tepat!
    </p>

    <div class="pasangan">

      <div class="kolom">
        <h3>Kata</h3>

        <label>
          Perumahan
          <select id="perumahan">
            <option value="">-- Pilih Makna --</option>
            <option value="tempat">Menyatakan tempat</option>
            <option value="proses">Menyatakan proses</option>
            <option value="kumpulan">Menyatakan kumpulan</option>
          </select>
        </label>

        <label>
          Pelatihan
          <select id="pelatihan">
            <option value="">-- Pilih Makna --</option>
            <option value="tempat">Menyatakan tempat</option>
            <option value="proses">Menyatakan proses</option>
            <option value="kumpulan">Menyatakan kumpulan</option>
          </select>
        </label>

        <label>
          Persawahan
          <select id="persawahan">
            <option value="">-- Pilih Makna --</option>
            <option value="tempat">Menyatakan tempat</option>
            <option value="proses">Menyatakan proses</option>
            <option value="kumpulan">Menyatakan kumpulan</option>
          </select>
        </label>

      </div>

    </div>

    <button onclick="periksaJawaban()">
      Periksa Jawaban
    </button>

    <div id="hasil"></div>

  </div>

  <script>

    function periksaJawaban(){

      let perumahan =
        document.getElementById("perumahan").value;

      let pelatihan =
        document.getElementById("pelatihan").value;

      let persawahan =
        document.getElementById("persawahan").value;

      let hasil =
        document.getElementById("hasil");

      if(
        perumahan === "tempat" &&
        pelatihan === "proses" &&
        persawahan === "kumpulan"
      ){
        hasil.innerHTML =
          "✅ Jawaban benar!";
        hasil.className = "benar";
      } else {
        hasil.innerHTML =
          "❌ Jawaban salah.<br><br>" +
          "Jawaban yang benar:<br>" +
          "• Perumahan → Menyatakan tempat<br>" +
          "• Pelatihan → Menyatakan proses<br>" +
          "• Persawahan → Menyatakan kumpulan";
        hasil.className = "salah";
      }

    }

  </script>
