    <h2>Soal 6</h2>

    <img src="https://i.imgur.com/GdjdzTW.png" alt="data RT">

    <p>
      Jumlah penduduk di beberapa RT pada suatu wilayah adalah sebagai berikut:
      RT 1, RT 2, RT 3, dan RT 4. Berdasarkan data tersebut,
      jumlah seluruh warga di keempat RT tersebut adalah …………….
    </p>
<input type="number" id="jawaban" placeholder="Masukkan jawaban di sini">
    <button onclick="periksaJawaban()">Periksa Jawaban</button>

    <div id="hasil"></div>

  </div>

  <script>
  function periksaJawaban(){

    const jawabanBenar = "290";

    let jawabanUser = document.getElementById("jawaban").value;

    let hasil = document.getElementById("hasil");

    if(jawabanUser === jawabanBenar){
      hasil.innerHTML = "✔ Jawaban benar!";
      hasil.className = "benar";
    } else {
      hasil.innerHTML = "✘ Jawaban salah, coba lagi!";
      hasil.className = "salah";
    }
  }
</script>
