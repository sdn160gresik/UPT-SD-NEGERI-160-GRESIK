  <div class="container">

    <h2>Soal 16</h2>

    <p>
      Berilah tanda centang (√) pada pernyataan yang benar tentang kegiatan ekonomi dan pemanfaatan sumber daya alam! (Jawaban lebih dari satu)
    </p>

    <div class="pilihan">

      <label>
        <input type="checkbox" name="jawaban" value="1">
        Kegiatan perkebunan memerlukan tanah dan air yang cukup
      </label>

      <label>
        <input type="checkbox" name="jawaban" value="2">
        Sumber daya alam perlu dijaga agar tidak cepat habis
      </label>

      <label>
        <input type="checkbox" name="jawaban" value="3">
        Semua kegiatan ekonomi dapat berjalan tanpa bantuan alam
      </label>

      <label>
        <input type="checkbox" name="jawaban" value="4">
        Hasil laut merupakan salah satu sumber ekonomi masyarakat pesisir
      </label>

    </div>

    <button onclick="periksaJawaban()">
      Periksa Jawaban
    </button>

    <div id="hasil"></div>

  </div>

  <script>

    function periksaJawaban(){

      let pilihan =
        document.querySelectorAll('input[name="jawaban"]:checked');

      let hasil = document.getElementById("hasil");

      let jawaban = [];

      pilihan.forEach((item)=>{
        jawaban.push(item.value);
      });

      if(jawaban.length === 0){
        hasil.innerHTML = "⚠️ Pilih jawaban terlebih dahulu!";
        hasil.className = "salah";
        return;
      }

      let benar =
        jawaban.includes("1") &&
        jawaban.includes("2") &&
        jawaban.includes("4") &&
        !jawaban.includes("3");

      if(benar){

        hasil.innerHTML =
          "✅ Jawaban benar! Pernyataan yang tepat adalah nomor 1, 2, dan 4.";

        hasil.className = "benar";

      } else {

        hasil.innerHTML =
          "❌ Jawaban masih kurang tepat. Coba lagi!";

        hasil.className = "salah";
      }

    }

  </script>
