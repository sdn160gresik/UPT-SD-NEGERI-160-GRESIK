  <div class="container">

    <h2>Soal 3</h2>

    <p>
      Dalam kegiatan pembelajaran matematika, siswa kelas 5 diminta mengukur beberapa sudut menggunakan busur derajat, yaitu 45°, 90°, dan 135°.
      Berdasarkan informasi tersebut, beri tanda centang (✔) pada pernyataan yang benar!
    </p>

    <div class="soal-box">

      <div class="item">
        <input type="checkbox" id="q1">
        <label>Sudut 45° termasuk sudut lancip</label>
      </div>

      <div class="item">
        <input type="checkbox" id="q2">
        <label>Sudut 90° termasuk sudut tumpul</label>
      </div>

      <div class="item">
        <input type="checkbox" id="q3">
        <label>Sudut 135° termasuk sudut tumpul</label>
      </div>

      <div class="item">
        <input type="checkbox" id="q4">
        <label>Sudut 45° termasuk sudut siku-siku</label>
      </div>

      <div class="item">
        <input type="checkbox" id="q5">
        <label>Semua sudut yang diberikan termasuk sudut lancip</label>
      </div>

    </div>

    <button onclick="periksaJawaban()">Periksa Jawaban</button>

    <div id="hasil"></div>

  </div>

  <script>
    function periksaJawaban(){

      // jawaban benar: 1 dan 3 saja
      const benar = ["q1", "q3"];

      const semua = ["q1","q2","q3","q4","q5"];

      let skor = 0;

      semua.forEach(id => {
        const checked = document.getElementById(id).checked;

        if(benar.includes(id) && checked){
          skor++;
        }

        if(!benar.includes(id) && checked){
          skor--;
        }
      });

      let hasil = document.getElementById("hasil");

      if(skor === benar.length){
        hasil.innerHTML = "✔ Semua jawaban benar!";
        hasil.className = "benar";
      } else {
        hasil.innerHTML = "✘ Ada jawaban yang salah!";
        hasil.className = "salah";
      }
    }
  </script>
