    textarea{

    button{

      color:white;

      border-radius:8px;

    button:hover{

    }

    #hasil{
      margin-top:20px;
      font-size:18px;

      color:green;

    .tombol-kembali{
      display:inline-block;
      margin-top:-5px;
      margin-bottom:20px;
      padding:10px 18px;
      background:#e67e22;
      color:white;
      text-decoration:none;
      border-radius:8px;
      font-weight:bold;
      transition:0.3s;
    }

    .tombol-kembali:hover{
      background:#ca6f1e;
    }

  <div class="container">

    <h2>Soal 17</h2>

    <p>
      Tuliskan dua pengaruh buruk yang dirasakan masyarakat Indonesia akibat penjajahan bangsa Eropa!
    </p>

    <textarea id="jawaban" placeholder="Tulis jawaban di sini..."></textarea>

    <button onclick="periksaJawaban()">
      Periksa Jawaban
    </button>

    <div id="hasil"></div>

  </div>

  <script>

    function periksaJawaban(){

      let jawaban =
        document.getElementById("jawaban").value.trim();

      let hasil = document.getElementById("hasil");

      if(jawaban === ""){
        hasil.innerHTML = "⚠️ Jawaban belum diisi!";
        hasil.className = "salah";
        return;
      }

      hasil.innerHTML =
        "✅ Jawaban telah dikirim! Contoh pengaruh buruk penjajahan adalah rakyat mengalami kemiskinan, kerja paksa, dan kehilangan kebebasan.";

      hasil.className = "benar";
    }

  </script>
