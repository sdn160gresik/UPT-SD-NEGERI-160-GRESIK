    <h2>Soal 15</h2>

    <p>
      Pasangkan bagian-bagian peta berikut dengan kegunaannya yang tepat!
    </p>

    <table>
      <tr>
        <th>Bagian Peta</th>
        <th>Pilih Fungsi</th>
      </tr>

      <tr>
        <td>1. Legenda</td>
        <td>
          <select id="jawaban1">
            <option value="">-- Pilih --</option>
            <option value="A">Menunjukkan letak wilayah dari barat ke timur di Bumi</option>
            <option value="B">Menunjukkan perbandingan jarak di peta dengan jarak sebenarnya</option>
            <option value="C">Menunjukkan arah utara, selatan, timur, barat</option>
            <option value="D">Menjelaskan arti simbol-simbol di peta</option>
          </select>
        </td>
      </tr>

      <tr>
        <td>2. Skala</td>
        <td>
          <select id="jawaban2">
            <option value="">-- Pilih --</option>
            <option value="A">Menunjukkan letak wilayah dari barat ke timur di Bumi</option>
            <option value="B">Menunjukkan perbandingan jarak di peta dengan jarak sebenarnya</option>
            <option value="C">Menunjukkan arah utara, selatan, timur, barat</option>
            <option value="D">Menjelaskan arti simbol-simbol di peta</option>
          </select>
        </td>
      </tr>

      <tr>
        <td>3. Arah Mata Angin</td>
        <td>
          <select id="jawaban3">
            <option value="">-- Pilih --</option>
            <option value="A">Menunjukkan letak wilayah dari barat ke timur di Bumi</option>
            <option value="B">Menunjukkan perbandingan jarak di peta dengan jarak sebenarnya</option>
            <option value="C">Menunjukkan arah utara, selatan, timur, barat</option>
            <option value="D">Menjelaskan arti simbol-simbol di peta</option>
          </select>
        </td>
      </tr>

      <tr>
        <td>4. Garis Lintang</td>
        <td>
          <select id="jawaban4">
            <option value="">-- Pilih --</option>
            <option value="A">Menunjukkan letak wilayah dari barat ke timur di Bumi</option>
            <option value="B">Menunjukkan perbandingan jarak di peta dengan jarak sebenarnya</option>
            <option value="C">Menunjukkan arah utara, selatan, timur, barat</option>
            <option value="D">Menjelaskan arti simbol-simbol di peta</option>
          </select>

    </table>

	

    <button onclick="periksaJawaban()">
      Periksa Jawaban
    </button>

    <div id="hasil"></div>

  </div>

  <script>

    function periksaJawaban(){

      let j1 = document.getElementById("jawaban1").value;
      let j2 = document.getElementById("jawaban2").value;
      let j3 = document.getElementById("jawaban3").value;
      let j4 = document.getElementById("jawaban4").value;

      let hasil = document.getElementById("hasil");

      if(j1 === "" || j2 === "" || j3 === "" || j4 === ""){
        hasil.innerHTML = "⚠️ Semua jawaban harus dipilih!";
        hasil.className = "salah";
        return;
      }

      if(
  j1 === "D" &&
  j2 === "B" &&
  j3 === "C" &&
  j4 === "A"
){

        hasil.innerHTML =
          "✅ Jawaban benar! Semua pasangan bagian peta dan fungsinya sudah tepat.";

        hasil.className = "benar";

      } else {

        hasil.innerHTML =
          "❌ Jawaban masih ada yang salah. Coba lagi!";

        hasil.className = "salah";
      }

    }

  </script>
