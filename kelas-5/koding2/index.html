<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Buku Digital Koding dan Kecerdasan Artifisial">

    <meta name="theme-color" content="#07131d">

    <title>Koding dan Kecerdasan Artifisial</title>

    <!-- Favicon -->
    <link rel="icon" href="assets/icon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="book.css">

</head>

<body>

    <!-- =====================================================
         HUD CONTAINER
    ====================================================== -->

    <div class="hud-container">

        <!-- FRAME -->

        <img
            src="assets/frame.png"
            class="hud-frame"
            alt="HUD Frame">

        <!-- BOOK -->

        <section class="book-wrapper">

            <div class="viewer">

                <main id="book">

                    <!-- Halaman dimuat otomatis oleh script.js -->

                </main>

                <!-- NAVIGATION -->

                <nav class="navigation" aria-label="Navigasi Halaman">

                    <button
                        id="prevBtn"
                        type="button"
                        title="Halaman Sebelumnya"
                        aria-label="Halaman Sebelumnya">

                        ◀

                    </button>

                    <span
                        id="pageIndicator"
                        aria-live="polite">

                        1 / 1

                    </span>

                    <button
                        id="nextBtn"
                        type="button"
                        title="Halaman Berikutnya"
                        aria-label="Halaman Berikutnya">

                        ▶

                    </button>

                </nav>

            </div>

        </section>

    </div>

    <!-- =====================================================
         LIGHTBOX
    ====================================================== -->

    <div
        id="lightbox"
        class="lightbox"
        role="dialog"
        aria-hidden="true">

        <button
            class="close"
            type="button"
            aria-label="Tutup">

            &times;

        </button>

        <img
            id="lightbox-image"
            alt="Preview Gambar">

    </div>

    <!-- =====================================================
         JAVASCRIPT
    ====================================================== -->

    <script src="script.js"></script>

</body>

</html>
