<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Komik Viewer</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Quicksand', sans-serif; }
    
    html, body, #app { height: 100%; width: 100%; }
    
    .comic-container {
      perspective: 1200px;
      position: relative;
    }
    
    #comic-img {
      display: block;
      max-height: 100%;
      max-width: 100%;
      width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      transition: all 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      opacity: 1;
      object-fit: contain;
    }
    
    #comic-img.fade-out {
      opacity: 0;
    }
    
    #left-zone, #right-zone {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      z-index: 10;
      cursor: pointer;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
    }
    
    #left-zone { left: 0; }
    #right-zone { right: 0; }
    
    #left-zone:hover, #right-zone:hover {
      background-color: rgba(255, 255, 255, 0.08);
    }
    
    #left-zone::after, #right-zone::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 32px;
      opacity: 0;
      transition: opacity 0.3s ease;
      color: rgba(255, 255, 255, 0.6);
    }
    
    #left-zone::after {
      left: 20px;
      content: '‹';
    }
    
    #right-zone::after {
      right: 20px;
      content: '›';
    }
    
    #left-zone:hover::after, #right-zone:hover::after {
      opacity: 1;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <style>body { box-sizing: border-box; }</style>
 <script src="/_sdk/telemetry_sdk.js"></script></head>
 <body class="h-full">
  <div id="app" class="h-full w-full bg-gray-900 flex flex-col items-center justify-center overflow-hidden relative select-none">
   <div class="comic-container relative flex items-center justify-center w-full" style="height: 80%; max-width: 50.4%;">
    <div id="left-zone"></div>
    <div id="right-zone"></div><img id="comic-img" src="" alt="Komik">
   </div>
   <p id="page-info" class="text-gray-400 mt-4 text-sm font-medium"></p>
  </div>
  <script>
    const images = [
      'https://raw.githubusercontent.com/sdn160gresik/komik/main/mtk/k-1/judul.jpg',
      'https://raw.githubusercontent.com/sdn160gresik/komik/main/mtk/k-1/1_11zon.webp',
      'https://raw.githubusercontent.com/sdn160gresik/komik/main/mtk/k-1/2_11zon.webp',
      'https://raw.githubusercontent.com/sdn160gresik/komik/main/mtk/k-1/3_11zon.webp',
      'https://raw.githubusercontent.com/sdn160gresik/komik/main/mtk/k-1/4_11zon.webp',
      'https://raw.githubusercontent.com/sdn160gresik/komik/main/mtk/k-1/5_11zon.webp',
      'https://raw.githubusercontent.com/sdn160gresik/komik/main/mtk/k-1/tama.jpeg'
    ];
    
    let current = 0;
    let isAnimating = false;
    const img = document.getElementById('comic-img');
    const info = document.getElementById('page-info');
    
    function loadImage() {
      img.classList.remove('fade-out');
      img.src = images[current];
      info.textContent = `${current + 1} / ${images.length}`;
      isAnimating = false;
    }
    
    function navigate(direction) {
      if (isAnimating) return;
      
      const nextPage = direction === 'next' ? current + 1 : current - 1;
      if (nextPage < 0 || nextPage >= images.length) return;
      
      isAnimating = true;
      img.classList.add('fade-out');
      
      setTimeout(() => {
        current = nextPage;
        loadImage();
      }, 400);
    }
    
    // Initial load
    loadImage();
    
    // Event listeners
    document.getElementById('right-zone').addEventListener('click', () => navigate('next'));
    document.getElementById('left-zone').addEventListener('click', () => navigate('prev'));
    
    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') navigate('next');
      if (e.key === 'ArrowLeft') navigate('prev');
    });
    
    // Element SDK initialization
    const defaultConfig = {
      title: 'Komik Matematika',
      background_color: '#111827',
      text_color: '#ffffff',
      accent_color: '#9ca3af'
    };
    
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        document.getElementById('title').textContent = config.title || defaultConfig.title;
        document.getElementById('title').style.color = config.text_color || defaultConfig.text_color;
        document.getElementById('app').style.backgroundColor = config.background_color || defaultConfig.background_color;
        info.style.color = config.accent_color || defaultConfig.accent_color;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { 
            get: () => config.background_color || defaultConfig.background_color, 
            set: (v) => { 
              config.background_color = v; 
              window.elementSdk.setConfig({ background_color: v }); 
            } 
          },
          { 
            get: () => config.text_color || defaultConfig.text_color, 
            set: (v) => { 
              config.text_color = v; 
              window.elementSdk.setConfig({ text_color: v }); 
            } 
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ['title', config.title || defaultConfig.title]
      ])
    });
  </script>

</html>
