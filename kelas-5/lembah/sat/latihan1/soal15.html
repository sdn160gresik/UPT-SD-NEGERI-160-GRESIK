<div class="container">

    <h2>Soal 15</h2>

    <p>
        Diagram berikut adalah diagram batang tentang cara berangkat ke sekolah siswa kelas V SD Pancasila.
    </p>

    <!-- Gambar -->
    <div class="gambar">
        <img src="https://i.imgur.com/qv5Ht5i.png" alt="Diagram transportasi siswa">
    </div>

    <p>
        Berdasarkan data tersebut, cara transportasi apakah yang paling banyak digunakan siswa kelas V untuk pergi ke sekolah?
    </p>

    <div class="pilihan">

        <label>
            <input type="radio" name="jawaban" value="A">
            A. Angkutan umum
        </label>

        <label>
            <input type="radio" name="jawaban" value="B">
            B. Berjalan kaki
        </label>

        <label>
            <input type="radio" name="jawaban" value="C">
            C. Diantar orang tua
        </label>

        <label>
            <input type="radio" name="jawaban" value="D">
            D. Naik sepeda
        </label>

    </div>

    <button onclick="periksaJawaban()">
        Periksa Jawaban
    </button>

    <div id="hasil"></div>

</div>

<script>
function periksaJawaban(){

    const jawabanBenar = "D";

    let jawaban = document.querySelector('input[name="jawaban"]:checked');

    let hasil = document.getElementById("hasil");

    if(!jawaban){
        hasil.innerHTML = "⚠️ Pilih salah satu jawaban terlebih dahulu!";
        hasil.className = "salah";
        return;
    }

    if(jawaban.value === jawabanBenar){
        hasil.innerHTML = "✅ Jawaban benar!";
        hasil.className = "benar";
    }else{
        hasil.innerHTML = "❌ Jawaban masih kurang tepat!";
        hasil.className = "salah";
    }
}
</script>
