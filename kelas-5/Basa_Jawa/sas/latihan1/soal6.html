    <h2>Soal 6</h2>

    <div class="aksara-jawa">
      ꦲꦏꦸ ꦱꦼꦤꦼꦁ ꦩꦠꦼꦩꦠꦶꦏ
    </div>

    <p>
      Ukara ing dhuwur yen ditulis nganggo aksara latin yaiku
      <b>“aku seneng matematika”</b>
    </p>

    <div class="pilihan">
      <label>
        <input type="radio" name="jawaban" value="bener">
        Bener
      </label>

      <label>
        <input type="radio" name="jawaban" value="kliru">
        Kliru
      </label>
    </div>

    <p><b>Wenehana alasanmu!</b></p>

    <textarea placeholder="Tulisen alasanmu ing kene..."></textarea>

    <button onclick="periksaJawaban()">
      Kirim Jawaban
    </button>

    <div id="hasil"></div>

  </div>

  <script>

    function periksaJawaban(){

      let jawaban = document.querySelector('input[name="jawaban"]:checked');
      let alasan = document.querySelector("textarea").value.trim();

      let hasil = document.getElementById("hasil");

      if(jawaban === null){
        hasil.innerHTML = "⚠️ Pilih jawaban luwih dhisik!";
        hasil.className = "salah";
        return;
      }

      if(alasan === ""){
        hasil.innerHTML = "⚠️ Alasan kudu diisi!";
        hasil.className = "salah";
        return;
      }

      if(jawaban.value === "bener"){

        hasil.innerHTML =
          "✅ Jawaban bener! Tulisan aksara Jawa kasebut diwaca 'aku seneng matematika'.";

        hasil.className = "benar";

      } else {

        hasil.innerHTML =
          "❌ Jawaban durung pas. Coba diwaca maneh aksara Jawane.";

        hasil.className = "salah";
      }

    }

  </script>
