<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perkalian Lingkaran</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Fredoka', sans-serif; }
    .circle {
      width: 130px; height: 130px;
      border-radius: 50%;
      border: 5px solid #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; font-weight: 700; color: #fff;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3), inset -3px -3px 8px rgba(0,0,0,0.2);
      transition: transform 0.3s;
      position: relative;
      overflow: hidden;
    }
    .circle::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
      pointer-events: none;
    }
    .circle:hover { transform: scale(1.05); }
    
    #c1 { text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    #c2 { text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    #c3 { text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    
    .num-btn {
      width: 60px; height: 60px; border-radius: 50%;
      font-size: 24px; font-weight: 700;
      border: none; cursor: pointer;
      transition: all 0.3s;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset -2px -2px 5px rgba(0,0,0,0.3);
    }
    .num-btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 50%);
      pointer-events: none;
    }
    .num-btn:hover:not(.disabled) { transform: scale(1.15) translateY(-4px); box-shadow: 0 12px 28px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(0,0,0,0.3); }
    .num-btn.selected { transform: scale(1.3) translateY(-6px); box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset -3px -3px 8px rgba(0,0,0,0.4); }
    .num-btn.disabled { opacity: 0.4; pointer-events: none; }
    
    .btn-1 { background: linear-gradient(135deg, #FF6B6B 0%, #FF8E72 100%); color: #fff; }
    .btn-2 { background: linear-gradient(135deg, #FF9F5A 0%, #FF7A59 100%); color: #fff; }
    .btn-3 { background: linear-gradient(135deg, #FFD93D 0%, #FFC93A 100%); color: #1e3a5f; }
    .btn-4 { background: linear-gradient(135deg, #6BCB77 0%, #4A9D6F 100%); color: #fff; }
    .btn-5 { background: linear-gradient(135deg, #4D96FF 0%, #357ABD 100%); color: #fff; }
    .btn-6 { background: linear-gradient(135deg, #A78BFA 0%, #8B5CF6 100%); color: #fff; }
    .btn-7 { background: linear-gradient(135deg, #F472B6 0%, #EC4899 100%); color: #fff; }
    .btn-8 { background: linear-gradient(135deg, #22D3EE 0%, #0891B2 100%); color: #fff; }
    .btn-9 { background: linear-gradient(135deg, #FB923C 0%, #EA580C 100%); color: #fff; }
    .emoji-float {
      position: fixed; font-size: 48px; pointer-events: none;
      animation: floatUp 2s ease-out forwards;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-250px) scale(1.6) rotate(45deg); }
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
    .pulse { animation: pulse 0.6s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
    .shake { animation: shake 0.5s ease; }
    .result-popup {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 40px 60px; border-radius: 25px;
      font-size: 36px; font-weight: 700;
      text-align: center; z-index: 1000;
      box-shadow: 0 15px 50px rgba(0,0,0,0.5);
      animation: popupShow 0.5s ease;
      letter-spacing: 1px;
    }
    @keyframes popupShow {
      0% { transform: translate(-50%, -50%) scale(0.3) rotate(-15deg); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.15) rotate(8deg); }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    }
    .result-popup.hide {
      animation: popupHide 0.5s ease forwards;
    }
    @keyframes popupHide {
      0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.3) rotate(15deg); opacity: 0; }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full flex flex-col items-center justify-center overflow-auto" style="background: #0f2744; padding: 20px;">
   <h1 id="title" class="text-white text-3xl md:text-4xl font-bold mb-10 tracking-wide drop-shadow-lg">Perkalian Lingkaran</h1><!-- Circles Display -->
   <div class="flex items-center gap-4 md:gap-8 mb-12 flex-wrap justify-center">
    <div class="flex flex-col items-center gap-3">
     <div id="c1" class="circle"></div><span class="text-white text-sm opacity-70 font-semibold">Hasil</span>
    </div><span class="text-white text-5xl font-bold">=</span>
    <div class="flex flex-col items-center gap-3">
     <div id="c2" class="circle"></div><span class="text-white text-sm opacity-70 font-semibold">Angka 1</span>
    </div><span class="text-white text-5xl font-bold">×</span>
    <div class="flex flex-col items-center gap-3">
     <div id="c3" class="circle"></div><span class="text-white text-sm opacity-70 font-semibold">Angka 2</span>
    </div>
   </div>
   <p id="instruction" class="text-white text-lg mb-8 opacity-85 text-center">Pilih dua angka (1-9) yang menghasilkan bilangan di lingkaran!</p><!-- Timer Display -->
   <div class="mb-8 w-full max-w-md px-4">
    <div class="flex justify-between items-center mb-2"><span class="text-white text-sm font-semibold opacity-75">Waktu Tersisa</span> <span id="timerText" class="text-white text-lg font-bold" style="color:#FACC15;">30s</span>
    </div>
    <div class="w-full h-3 bg-gray-700 rounded-full overflow-hidden border-2 border-white">
     <div id="timerBar" class="h-full transition-all" style="width: 100%; background: linear-gradient(90deg, #10b981 0%, #FACC15 50%, #ef4444 100%);"></div>
    </div>
   </div><!-- Number Buttons Grid -->
   <div id="numpad" class="grid grid-cols-5 gap-3 mb-8 md:gap-4"></div><!-- Action Buttons -->
   <div class="flex gap-4 mb-8 flex-wrap justify-center">
    <button id="resetBtn" onclick="resetSelection()" class="px-6 py-3 rounded-full text-lg font-bold transition hover:scale-110 shadow-lg" style="background:#ef4444; color:#ffffff;">Ganti Jawaban ↺</button> <button id="checkBtn" onclick="checkAnswer()" class="px-8 py-3 rounded-full text-lg font-bold transition hover:scale-110 shadow-lg" style="background:#3b82f6; color:#ffffff;">Cek Jawaban ✓</button> <button onclick="resetGame()" class="px-8 py-3 rounded-full text-lg font-bold transition hover:scale-110 shadow-lg" style="background:#FACC15; color:#1e3a5f;">Soal Baru 🔄</button>
   </div><!-- Score Display -->
   <p id="score" class="text-white mt-8 text-xl font-semibold">Skor: <span id="scoreVal" style="color:#FACC15;">0</span></p>
  </div>
  <div id="resultPopup" class="result-popup" style="display:none;"></div>
  <script>
  const defaultConfig = {
    game_title: 'Perkalian Lingkaran',
    bg_color: '#0f2744',
    result_color: '#FF6B6B',
    number_color: '#4ECDC4',
    text_color: '#ffffff',
    font_family: 'Fredoka'
  };

  let target = 0, picks = [], score = 0, validPairs = [], timerInterval = null, timeLeft = 30;

  function generateProblem() {
    clearInterval(timerInterval);
    timeLeft = 30;
    document.getElementById('timerBar').style.width = '100%';
    
    const a = Math.floor(Math.random() * 8) + 2;
    const b = Math.floor(Math.random() * 8) + 2;
    target = a * b;
    validPairs = [];
    for (let i = 2; i <= 9; i++) {
      for (let j = i; j <= 9; j++) {
        if (i * j === target) validPairs.push([i, j]);
      }
    }
    picks = [];
    document.getElementById('c1').textContent = target;
    document.getElementById('c1').classList.add('pulse');
    setTimeout(() => document.getElementById('c1').classList.remove('pulse'), 600);
    document.getElementById('c2').textContent = '?';
    document.getElementById('c3').textContent = '?';
    updateCircleColors();
    buildNumpad();
    startTimer();
  }

  function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      const percentage = (timeLeft / 30) * 100;
      document.getElementById('timerBar').style.width = percentage + '%';
      document.getElementById('timerText').textContent = timeLeft + 's';
      
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        showResultPopup('⏰ Waktu Habis!', '#ef4444');
        spawnEmojis('⏰', 15);
        setTimeout(generateProblem, 2000);
      }
    }, 1000);
  }

  function updateCircleColors() {
    const config = window.elementSdk.config;
    const resultColor = config.result_color || defaultConfig.result_color;
    const numberColor = config.number_color || defaultConfig.number_color;
    
    // Lingkaran Hasil - warna berbeda
    document.getElementById('c1').style.background = `linear-gradient(135deg, ${resultColor} 0%, ${adjustBrightness(resultColor, 20)} 100%)`;
    
    // Lingkaran Angka 1 dan 2 - warna sama
    document.getElementById('c2').style.background = `linear-gradient(135deg, ${numberColor} 0%, ${adjustBrightness(numberColor, 20)} 100%)`;
    document.getElementById('c3').style.background = `linear-gradient(135deg, ${numberColor} 0%, ${adjustBrightness(numberColor, 20)} 100%)`;
  }

  function adjustBrightness(color, percent) {
    const num = parseInt(color.replace("#",""), 16);
    const amt = Math.round(2.55 * percent);
    const R = (num >> 16) + amt;
    const G = (num >> 8 & 0x00FF) + amt;
    const B = (num & 0x0000FF) + amt;
    return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 +
      (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255))
      .toString(16).slice(1);
  }

  function buildNumpad() {
    const pad = document.getElementById('numpad');
    pad.innerHTML = '';
    const colorClasses = ['btn-1', 'btn-2', 'btn-3', 'btn-4', 'btn-5', 'btn-6', 'btn-7', 'btn-8', 'btn-9'];
    for (let i = 1; i <= 9; i++) {
      const btn = document.createElement('button');
      btn.className = `num-btn ${colorClasses[i-1]}`;
      btn.textContent = i;
      if (i === 1) {
        btn.classList.add('disabled');
        btn.onclick = null;
      } else {
        btn.onclick = () => pickNum(i, btn);
      }
      pad.appendChild(btn);
    }
  }

  function pickNum(n, btn) {
    if (picks.length === 0) {
      picks.push(n);
      document.getElementById('c2').textContent = n;
      document.getElementById('c2').classList.add('pulse');
      setTimeout(() => document.getElementById('c2').classList.remove('pulse'), 600);
      updateButtonStates();
      return;
    }
    
    if (picks.length === 1) {
      picks.push(n);
      document.getElementById('c3').textContent = n;
      document.getElementById('c3').classList.add('pulse');
      setTimeout(() => document.getElementById('c3').classList.remove('pulse'), 600);
      updateButtonStates();
      return;
    }
    
    if (picks[0] === n) {
      picks[0] = n;
      document.getElementById('c2').textContent = n;
      document.getElementById('c2').classList.add('pulse');
      setTimeout(() => document.getElementById('c2').classList.remove('pulse'), 600);
      return;
    }
    
    picks[1] = n;
    document.getElementById('c3').textContent = n;
    document.getElementById('c3').classList.add('pulse');
    setTimeout(() => document.getElementById('c3').classList.remove('pulse'), 600);
    updateButtonStates();
    return;
  }

  function updateButtonStates() {
    const buttons = document.querySelectorAll('.num-btn');
    buttons.forEach((btn, idx) => {
      btn.classList.remove('selected');
      btn.classList.remove('disabled');
    });
    
    if (picks.length > 0) {
      const firstPickedNum = picks[0];
      const buttons = document.querySelectorAll('.num-btn');
      const firstBtn = buttons[firstPickedNum - 1];
      firstBtn.classList.add('selected');
    }
    
    if (picks.length > 1) {
      const secondPickedNum = picks[1];
      const buttons = document.querySelectorAll('.num-btn');
      const secondBtn = buttons[secondPickedNum - 1];
      secondBtn.classList.add('selected');
    }
  }

  function resetSelection() {
    picks = [];
    document.getElementById('c2').textContent = '?';
    document.getElementById('c3').textContent = '?';
    buildNumpad();
  }

  function checkAnswer() {
    const correct = picks[0] * picks[1] === target;
    if (correct) {
      clearInterval(timerInterval);
      score++;
      document.getElementById('scoreVal').textContent = score;
      showResultPopup('✅ Benar!', '#10b981');
      spawnEmojis('🎉', 20);
      setTimeout(generateProblem, 2000);
    } else {
      showResultPopup('❌ Salah!', '#ef4444');
      spawnEmojis('❌', 12);
      document.getElementById('c2').classList.add('shake');
      document.getElementById('c3').classList.add('shake');
      setTimeout(() => {
        document.getElementById('c2').classList.remove('shake');
        document.getElementById('c3').classList.remove('shake');
        picks = [];
        document.getElementById('c2').textContent = '?';
        document.getElementById('c3').textContent = '?';
        buildNumpad();
      }, 500);
    }
  }

  function showResultPopup(message, bgColor) {
    const popup = document.getElementById('resultPopup');
    popup.textContent = message;
    popup.style.display = 'block';
    popup.style.background = bgColor;
    popup.style.color = '#fff';
    popup.classList.remove('hide');
    setTimeout(() => {
      popup.classList.add('hide');
      setTimeout(() => popup.style.display = 'none', 500);
    }, 1500);
  }

  function spawnEmojis(emoji, count) {
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'emoji-float';
      el.textContent = emoji;
      el.style.left = Math.random() * 90 + '%';
      el.style.top = (20 + Math.random() * 60) + '%';
      el.style.animationDelay = (Math.random() * 0.6) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }
  }

  function resetGame() {
    generateProblem();
  }

  // Element SDK
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => {
      const t = config.game_title || defaultConfig.game_title;
      const font = config.font_family || defaultConfig.font_family;
      const bg = config.bg_color || defaultConfig.bg_color;
      const tc = config.text_color || defaultConfig.text_color;
      
      document.getElementById('title').textContent = t;
      document.getElementById('app').style.background = bg;
      document.getElementById('title').style.fontFamily = `${font}, Fredoka, sans-serif`;
      document.querySelectorAll('.text-white').forEach(e => e.style.color = tc);
      document.getElementById('instruction').style.color = tc;
      document.getElementById('score').style.color = tc;
      
      // Update circle colors when config changes
      updateCircleColors();
    },
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.bg_color || defaultConfig.bg_color, set: (v) => { config.bg_color = v; window.elementSdk.setConfig({ bg_color: v }); } },
        { get: () => config.result_color || defaultConfig.result_color, set: (v) => { config.result_color = v; window.elementSdk.setConfig({ result_color: v }); } },
        { get: () => config.number_color || defaultConfig.number_color, set: (v) => { config.number_color = v; window.elementSdk.setConfig({ number_color: v }); } },
        { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } }
      ],
      borderables: [],
      fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
      fontSizeable: undefined
    }),
    mapToEditPanelValues: (config) => new Map([
      ['game_title', config.game_title || defaultConfig.game_title],
      ['result_color', config.result_color || defaultConfig.result_color],
      ['number_color', config.number_color || defaultConfig.number_color]
    ])
  });

  generateProblem();
  </script>
