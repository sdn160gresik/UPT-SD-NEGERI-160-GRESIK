  <div class="container">

    <h2>Soal 20</h2>

    <p>
      Negara Indonesia menganut bentuk pemerintahan republik yang dipimpin oleh seorang ………………… .
    </p>

    <input type="text" id="jawaban" placeholder="Tuliskan jawaban di sini">

    <br>

    <button onclick="periksaJawaban()">
      Periksa Jawaban
    </button>

    <div id="hasil"></div>

  </div>

  <script>

    function periksaJawaban(){

      let jawaban =
        document.getElementById("jawaban")
        .value
        .toLowerCase()
        .trim();

      let hasil =
        document.getElementById("hasil");

      if(jawaban === ""){

        hasil.innerHTML =
          "⚠️ Jawaban belum diisi!";

        hasil.className = "salah";

      } else if(
        jawaban === "presiden"
      ){

        hasil.innerHTML =
          "✅ Jawaban benar! Negara Indonesia dipimpin oleh seorang presiden.";

        hasil.className = "benar";

      } else {

        hasil.innerHTML =
          "❌ Jawaban salah. Coba lagi!";

        hasil.className = "salah";
      }

    }

  </script>
