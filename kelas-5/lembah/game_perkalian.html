<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiply Finder - Temukan Pasangan Perkalian</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&amp;display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    * {
      font-family: 'Nunito', sans-serif;
    }

    body {
      background: #1a1035;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes pulse-btn {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    @keyframes celebratePair {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1.1); }
    }

    @keyframes celebrateResult {
      0% { transform: scale(1); }
      30% { transform: scale(0.9); }
      60% { transform: scale(1.4); }
      100% { transform: scale(1.15); }
    }

    @keyframes particle {
      0% { opacity: 1; transform: scale(1) translateY(0); }
      100% { opacity: 0; transform: scale(0) translateY(-80px); }
    }

    @keyframes confetti-fall {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) rotate(720deg) scale(0.05);
      }
    }

    @keyframes modalPop {
      0% { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    @keyframes emojiPulse {
      0% { transform: scale(0.5); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    @keyframes backdropFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes timerPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .timer-container {
      font-size: 1.3rem;
      font-weight: 900;
      padding: 12px 24px;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.2);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ffb347;
      backdrop-filter: blur(10px);
      animation: timerPulse 1s ease-in-out infinite;
    }

    .timer-container.warning {
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.15);
      border-color: rgba(255, 107, 107, 0.4);
      animation: timerPulse 0.5s ease-in-out infinite;
    }

    .timer-bar {
      width: 200px;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      margin-left: 8px;
    }

    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, #6bcb77, #ffb347, #ff6b6b);
      border-radius: 10px;
      transition: width 0.1s linear;
    }

    .welcome-container {
      background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 25%, #6bcb77 50%, #4d96ff 75%, #a78bfa 100%);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      border-radius: 32px;
      padding: 48px 40px;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.3);
      border: 3px solid rgba(255, 255, 255, 0.4);
    }

    .circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
      user-select: none;
    }

    .circle:hover:not(.disabled) {
      transform: scale(1.12);
    }

    .circle.selected {
      transform: scale(1.15);
      box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.9), 0 0 30px rgba(255, 255, 255, 0.4);
    }

    .circle.disabled {
      cursor: default;
      opacity: 0.7;
    }

    .circle.correct-pair {
      animation: celebratePair 0.6s ease;
    }

    .circle.correct-result {
      animation: celebrateResult 0.8s ease;
    }

    .circle.wrong {
      animation: shake 0.4s ease;
    }

    .fade-in {
      animation: fadeInUp 0.5s ease forwards;
    }

    .modal-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 9998;
      animation: backdropFade 0.3s ease;
    }

    .result-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.85) 0%, rgba(30, 20, 60, 0.9) 100%);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      z-index: 10000;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 90vw;
      width: 500px;
    }

    .result-emoji {
      font-size: 5rem;
      margin-bottom: 20px;
      animation: emojiPulse 0.6s ease-out;
    }

    .result-title {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 12px;
      margin-top: 8px;
    }

    .result-text {
      font-size: 1.1rem;
      margin-bottom: 28px;
      line-height: 1.5;
      opacity: 0.95;
    }

    .result-correct .result-title {
      background: linear-gradient(135deg, #6bcb77 0%, #52b788 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .result-correct .result-text {
      color: #a3e9b5;
    }

    .result-wrong .result-title {
      background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .result-wrong .result-text {
      color: #ff8a8a;
    }

    .continue-btn {
      background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%);
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 1.05rem;
      font-weight: 900;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.3);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .continue-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(124, 58, 237, 0.5);
    }

    .continue-btn:active {
      transform: translateY(0);
    }

    .streak-particle {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      animation: particle 0.8s ease-out forwards;
    }

    .emoji-confetti {
      position: fixed;
      pointer-events: none;
      font-size: 2.5rem;
      animation: confetti-fall 3.5s ease-in forwards;
      z-index: 9999;
    }

    .start-btn {
      padding: 20px 48px;
      border-radius: 50px;
      font-size: 1.25rem;
      font-weight: 900;
      border: none;
      background: white;
      color: #ff6b6b;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      animation: pulse-btn 2s ease-in-out infinite;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .start-btn:hover {
      transform: scale(1.05);
    }

    .start-btn:active {
      transform: scale(0.95);
    }

    .next-btn {
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 900;
      border: none;
      background: #7c3aed;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .next-btn:hover {
      transform: scale(1.05);
    }

    .next-btn:active {
      transform: scale(0.95);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div id="app" class="h-full w-full flex flex-col items-center justify-center overflow-auto">
   <!-- Start Screen -->
   <div id="start-screen" class="text-center px-4 fade-in w-full h-full flex items-center justify-center">
    <div class="welcome-container">
     <h1 id="start-title" class="text-5xl font-black mb-6" style="color: white; text-shadow: 0 3px 10px rgba(0,0,0,0.3);">🎮 Temukan Pasangan Perkalian!</h1>
     <div class="h-1 bg-white opacity-80 mb-6 rounded-full" style="box-shadow: 0 0 10px rgba(255,255,255,0.5);"></div>
     <p id="start-instruction" class="text-2xl font-black mb-8" style="color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.2);">Pilih 2 angka yang hasil perkaliannya sama dengan angka ketiga</p><button id="start-btn" class="start-btn"> 🚀 Mulai Permainan <i data-lucide="play" style="width: 26px; height: 26px;"></i> </button>
    </div>
   </div><!-- Game Screen -->
   <div id="game-screen" class="text-center mb-2 px-4 w-full flex flex-col items-center" style="display: none;">
    <h1 id="title" class="text-3xl md:text-4xl font-black mb-1" style="color: #f0e6ff;">Temukan Pasangan Perkalian!</h1>
    <p id="instruction" class="text-base md:text-lg mb-1" style="color: #b8a5d4;">Pilih 2 angka yang hasil perkaliannya sama dengan angka ketiga</p>
    <div id="score-display" class="text-sm font-bold mb-4" style="color: #ffb347;">
     🔥 Benar Berturut-turut: <span id="streak">0</span>
    </div>
    <div class="timer-container" id="timer-container"><i data-lucide="clock" style="width: 24px; height: 24px;"></i> <span id="timer-text">30s</span>
     <div class="timer-bar">
      <div class="timer-fill" id="timer-fill" style="width: 100%;"></div>
     </div>
    </div>
   </div>
   <div id="circles" class="flex flex-wrap justify-center gap-5 md:gap-7 mb-6 px-4 max-w-lg"></div>
   <div id="emoji-display" class="text-9xl mb-2 h-24 flex items-center justify-center"></div>
   <div id="message" class="text-xl font-black mb-5 h-8" style="color: #f0e6ff;"></div><button id="next-btn" class="next-btn" style="display: none;"> Next Round <i data-lucide="arrow-right" style="width: 20px; height: 20px;"></i> </button> <!-- Modal -->
   <div id="modal-backdrop" class="modal-backdrop" style="display: none;"></div>
   <div id="result-modal" class="result-modal" style="display: none;">
    <div class="result-emoji" id="modal-emoji"></div>
    <div class="result-title" id="modal-title"></div>
    <div class="result-text" id="modal-text"></div><button class="continue-btn" id="continue-btn"> Lanjutkan <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i> </button>
   </div>
  </div>
  <script>
    const COLORS = [
      { bg: '#ff6b6b', text: '#fff' },
      { bg: '#ffd93d', text: '#1a1035' },
      { bg: '#6bcb77', text: '#fff' },
      { bg: '#4d96ff', text: '#fff' },
      { bg: '#ff922b', text: '#fff' },
      { bg: '#a78bfa', text: '#fff' },
      { bg: '#f472b6', text: '#fff' },
      { bg: '#06b6d4', text: '#fff' },
      { bg: '#ec4899', text: '#fff' },
      { bg: '#f97316', text: '#fff' },
    ];

    const defaultConfig = {
      app_title: 'Temukan Pasangan Perkalian!',
      instruction_text: 'Pilih 2 angka yang hasil perkaliannya sama dengan angka ketiga',
      background_color: '#1a1035',
      text_color: '#f0e6ff',
      secondary_text_color: '#b8a5d4',
      accent_color: '#7c3aed',
      highlight_color: '#ffb347',
      font_family: 'Nunito',
      font_size: 16,
    };

    let selected = [];
    let numbers = [];
    let a, b, product;
    let locked = false;
    let streak = 0;
    let timeLeft = 30;
    let timerInterval = null;
    let gameActive = false;

    function generate() {
      let valid = false;
      while (!valid) {
        a = Math.floor(Math.random() * 9) + 1;
        b = Math.floor(Math.random() * 9) + 1;
        product = a * b;

        const used = new Set([a, b, product]);
        const distractors = [];
        let tries = 0;

        while (distractors.length < 7 && tries < 3000) {
          tries++;
          const d = Math.floor(Math.random() * 81) + 1;
          if (used.has(d)) continue;

          const all = [a, b, product, ...distractors, d];
          let createsAccidentalPair = false;

          for (let i = 0; i < all.length && !createsAccidentalPair; i++) {
            for (let j = i + 1; j < all.length && !createsAccidentalPair; j++) {
              for (let k = 0; k < all.length && !createsAccidentalPair; k++) {
                if (k !== i && k !== j && all[i] * all[j] === all[k]) {
                  const isIntendedPair = 
                    (all[i] === a && all[j] === b && all[k] === product) ||
                    (all[i] === b && all[j] === a && all[k] === product);
                  if (!isIntendedPair) {
                    createsAccidentalPair = true;
                  }
                }
              }
            }
          }

          if (!createsAccidentalPair) {
            distractors.push(d);
            used.add(d);
          }
        }

        if (distractors.length === 7) {
          valid = true;
          numbers = [a, b, product, ...distractors];
        }
      }

      for (let i = numbers.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
      }
    }

    function render() {
      const container = document.getElementById('circles');
      container.innerHTML = '';
      selected = [];
      locked = false;
      document.getElementById('message').textContent = '';
      document.getElementById('emoji-display').textContent = '';
      document.getElementById('next-btn').style.display = 'none';

      numbers.forEach((num, i) => {
        const c = COLORS[i];
        const el = document.createElement('div');
        el.className = 'circle fade-in';
        el.style.background = c.bg;
        el.style.color = c.text;
        el.style.animationDelay = `${i * 0.08}s`;
        el.style.opacity = '0';
        el.textContent = num;
        el.dataset.index = i;
        el.addEventListener('click', () => handleClick(i, el));
        container.appendChild(el);
      });
      lucide.createIcons();
      startTimer();
    }

    function handleClick(idx, el) {
      if (!gameActive || locked || el.classList.contains('selected')) {
        if (el.classList.contains('selected')) {
          el.classList.remove('selected');
          selected = selected.filter(s => s.idx !== idx);
        }
        return;
      }
      if (selected.length >= 3) return;

      el.classList.add('selected');
      selected.push({ idx, el, num: numbers[idx] });
      playTick();

      if (selected.length === 3) {
        locked = true;
        setTimeout(check, 300);
      }
    }

    function check() {
      const [s1, s2, s3] = selected;
      const prod = s1.num * s2.num;

      if (s3.num === prod) {
        streak++;
        document.getElementById('streak').textContent = streak;
        s1.el.classList.add('correct-pair');
        s2.el.classList.add('correct-pair');
        s3.el.classList.add('correct-result');
        spawnParticles(s1.el);
        spawnParticles(s2.el);
        spawnParticles(s3.el);
        spawnConfetti('🎉', 40);
        playSuccess();
        showResultModal(true, s1.num, s2.num, s3.num);
      } else {
        streak = 0;
        document.getElementById('streak').textContent = streak;
        s1.el.classList.add('wrong');
        s2.el.classList.add('wrong');
        s3.el.classList.add('wrong');
        spawnConfetti('😢', 30);
        playWrong();
        showResultModal(false, s1.num, s2.num, s3.num, prod);
      }
      document.querySelectorAll('.circle').forEach(c => c.classList.add('disabled'));
    }

    function showResultModal(isCorrect, n1, n2, n3, actualProd = null) {
      const modal = document.getElementById('result-modal');
      const backdrop = document.getElementById('modal-backdrop');
      const emoji = document.getElementById('modal-emoji');
      const title = document.getElementById('modal-title');
      const text = document.getElementById('modal-text');

      modal.className = `result-modal ${isCorrect ? 'result-correct' : 'result-wrong'}`;

      if (isCorrect) {
        emoji.textContent = '🎉';
        title.textContent = 'Benar!';
        text.textContent = `${n1} × ${n2} = ${n3}`;
      } else {
        emoji.textContent = '😢';
        title.textContent = 'Salah!';
        text.textContent = `${n1} × ${n2} = ${actualProd}, bukan ${n3}`;
      }

      modal.style.display = 'block';
      backdrop.style.display = 'block';
    }

    function spawnParticles(el) {
      const rect = el.getBoundingClientRect();
      for (let i = 0; i < 6; i++) {
        const p = document.createElement('div');
        p.className = 'streak-particle';
        p.style.left = `${rect.left + rect.width / 2 + (Math.random() - 0.5) * 40}px`;
        p.style.top = `${rect.top + rect.height / 2}px`;
        p.style.width = p.style.height = `${8 + Math.random() * 8}px`;
        p.style.background = COLORS[Math.floor(Math.random() * COLORS.length)].bg;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
      }
    }

    function spawnConfetti(emoji, count = 40) {
      const emojis = emoji === '🎉' 
        ? ['🎉', '✨', '🌟', '⭐', '💫', '🎊', '🎈', '🌈', '🎁', '🎀', '🔥', '💥']
        : ['😢', '💔', '😭', '🌧️', '💨', '😞', '😩', '😤'];

      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'emoji-confetti';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];

        const startX = Math.random() * window.innerWidth;
        const horizontalSpread = (Math.random() - 0.5) * 400;
        const verticalDrop = 300 + Math.random() * 400;
        const swayAmount = (Math.random() - 0.5) * 150;

        const tx = horizontalSpread + swayAmount;
        const ty = verticalDrop;

        el.style.setProperty('--tx', `${tx}px`);
        el.style.setProperty('--ty', `${ty}px`);
        el.style.left = `${startX}px`;
        el.style.top = `-50px`;
        el.style.animationDelay = `${Math.random() * 0.3}s`;

        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3800);
      }
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function beep(freq, dur, type = 'sine') {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.08, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.connect(g);
      g.connect(audioCtx.destination);
      o.start();
      o.stop(audioCtx.currentTime + dur);
    }

    function playTick() {
      beep(600, 0.08);
    }

    function playSuccess() {
      beep(523, 0.15);
      setTimeout(() => beep(659, 0.15), 100);
      setTimeout(() => beep(784, 0.25), 200);
    }

    function playWrong() {
      beep(200, 0.25, 'square');
    }

    function startTimer() {
      gameActive = true;
      timeLeft = 30;
      updateTimerDisplay();
      clearInterval(timerInterval);
      
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          endGame();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const timerText = document.getElementById('timer-text');
      const timerContainer = document.getElementById('timer-container');
      const timerFill = document.getElementById('timer-fill');
      
      timerText.textContent = `${timeLeft}s`;
      const percentage = (timeLeft / 30) * 100;
      timerFill.style.width = `${percentage}%`;
      
      if (timeLeft <= 10) {
        timerContainer.classList.add('warning');
      } else {
        timerContainer.classList.remove('warning');
      }
    }

    function endGame() {
      gameActive = false;
      clearInterval(timerInterval);
      locked = true;
      document.querySelectorAll('.circle').forEach(c => c.classList.add('disabled'));
      
      const modal = document.getElementById('result-modal');
      const backdrop = document.getElementById('modal-backdrop');
      const emoji = document.getElementById('modal-emoji');
      const title = document.getElementById('modal-title');
      const text = document.getElementById('modal-text');
      
      modal.className = `result-modal result-wrong`;
      emoji.textContent = '⏰';
      title.textContent = 'Waktu Habis!';
      text.textContent = `Streak Akhir: ${streak} 🔥`;
      
      modal.style.display = 'block';
      backdrop.style.display = 'block';
    }

    document.getElementById('start-btn').addEventListener('click', () => {
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'flex';
      generate();
      render();
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      generate();
      render();
    });

    document.getElementById('continue-btn').addEventListener('click', () => {
      document.getElementById('result-modal').style.display = 'none';
      document.getElementById('modal-backdrop').style.display = 'none';
      clearInterval(timerInterval);
      streak = 0;
      document.getElementById('streak').textContent = '0';
      generate();
      render();
    });

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const c = { ...defaultConfig, ...config };
