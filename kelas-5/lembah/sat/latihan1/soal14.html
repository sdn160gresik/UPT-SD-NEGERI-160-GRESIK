        Selisih warga RT paling banyak dan paling sedikit adalah ……….
    </p>

    <div class="pilihan">

    <input 
        type="number" 
        id="jawabanInput" 
        placeholder="Tulis jawaban di sini"
    >

</div>

    <button onclick="periksaJawaban()">
        Periksa Jawaban
    </button>

    <div id="hasil"></div>

</div>

<script>
function periksaJawaban(){

    const jawabanBenar = "40";

    let jawaban = document
        .getElementById("jawabanInput")
        .value
        .trim();

    let hasil = document.getElementById("hasil");

    if(jawaban === ""){
        hasil.innerHTML = "⚠️ Isi jawaban terlebih dahulu!";
        hasil.className = "salah";
        return;
    }

    if(jawaban === jawabanBenar){
        hasil.innerHTML = "✅ Jawaban benar!";
        hasil.className = "benar";
    }else{
        hasil.innerHTML = "❌ Jawaban masih kurang tepat!";
        hasil.className = "salah";
    }
}
</script>
