  <div class="container">

    <h2>Soal 5</h2>

    <p>
      Perhatikan beberapa gambar sudut berikut!<br>
      Manakah gambar yang menunjukkan <b>sudut tumpul</b>?
    </p>

    <div class="gambar">
      <div>A<br><img src="https://i.imgur.com/pibRALk.png"></div>
      <div>B<br><img src="https://i.imgur.com/KpkQ5So.png"></div>
      <div>C<br><img src="https://i.imgur.com/iOOqstQ.png"></div>
      <div>D<br><img src="https://i.imgur.com/2pdQc3g.png"></div>
    </div>

    <div class="opsi">
      <label><input type="checkbox" id="A"> A</label><br>
      <label><input type="checkbox" id="B"> B</label><br>
      <label><input type="checkbox" id="C"> C</label><br>
      <label><input type="checkbox" id="D"> D</label>
    </div>

    <button onclick="cek()">Periksa Jawaban</button>

    <div id="hasil"></div>

  </div>

  <script>
    function cek(){
      const benar = ["B"];

      let semua = ["A","B","C","D"];
      let skor = 0;

      semua.forEach(id=>{
        let checked = document.getElementById(id).checked;

        if(benar.includes(id) && checked){
          skor++;
        }

        if(!benar.includes(id) && checked){
          skor--;
        }
      });

      let hasil = document.getElementById("hasil");

      if(skor === benar.length){
        hasil.innerHTML = "✔ Jawaban benar!";
        hasil.className = "benar";
      } else {
        hasil.innerHTML = "✘ Jawaban salah!";
        hasil.className = "salah";
      }
    }
  </script>
