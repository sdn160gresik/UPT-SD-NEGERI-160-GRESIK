<div class="container">

  <h2>Soal 20</h2>

  <p>
    Piranti ing pagelaran wayang sing digunakake kanggo nandhesake wayang nalika dipentasake yaiku ….
  </p>

  <div class="pilihan">

    <label>
      <input type="radio" name="jawaban" value="A">
      a. Kelir
    </label>

    <label>
      <input type="radio" name="jawaban" value="B">
      b. Blencong
    </label>

    <label>
      <input type="radio" name="jawaban" value="C">
      c. Gedebog
    </label>

    <label>
      <input type="radio" name="jawaban" value="D">
      d. Cempala
    </label>

  </div>

  <button onclick="periksaJawaban()">
    Periksa Jawaban
  </button>

  <div id="hasil"></div>

</div>

<script>

function periksaJawaban(){

  let jawaban = document.querySelector('input[name="jawaban"]:checked');
  let hasil = document.getElementById("hasil");

  if(!jawaban){
    hasil.innerHTML = "⚠️ Pilih salah satu jawaban!";
    hasil.className = "salah";
    return;
  }

  if(jawaban.value === "C"){

    hasil.innerHTML =
      "✅ Jawaban benar! Gedebog digunakake kanggo nandhesake wayang.";

    hasil.className = "benar";

  } else {

    hasil.innerHTML =
      "❌ Jawaban salah. Coba maneh!";

    hasil.className = "salah";
  }

}

</script>
