  <div class="container">

    <h2>Soal 12</h2>

    <p>
      <b>
        Manakah contoh sikap yang menunjukkan menghargai keberagaman budaya di Indonesia?
        (Jawaban benar lebih dari satu)
      </b>
    </p>

    <div class="pilihan">

      <label>
        <input type="checkbox" id="q1">
        Menghormati teman yang memiliki adat istiadat berbeda
      </label>

      <label>
        <input type="checkbox" id="q2">
        Menertawakan tarian daerah lain
      </label>

      <label>
        <input type="checkbox" id="q3">
        Mau belajar lagu daerah dari suku lain
      </label>

      <label>
        <input type="checkbox" id="q4">
        Menganggap budaya sendiri paling baik dibanding budaya lain
      </label>

    </div>

    <button onclick="periksaJawaban()">
      Periksa Jawaban
    </button>

    <div id="hasil"></div>

  </div>

  <script>

    function periksaJawaban(){

      let q1 = document.getElementById("q1").checked;
      let q2 = document.getElementById("q2").checked;
      let q3 = document.getElementById("q3").checked;
      let q4 = document.getElementById("q4").checked;

      let hasil = document.getElementById("hasil");

      if(q1 && q3 && !q2 && !q4){

        hasil.innerHTML =
          "✅ Jawaban benar! Sikap menghargai keberagaman budaya ditunjukkan dengan menghormati perbedaan dan mau mempelajari budaya daerah lain.";

        hasil.className = "benar";

      } else {

        hasil.innerHTML =
          "❌ Jawaban kurang tepat. Coba periksa kembali pilihanmu!";

        hasil.className = "salah";
      }
    }

  </script>
