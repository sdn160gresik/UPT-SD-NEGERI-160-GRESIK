<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Komik Pembelajaran</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f5f7fa;
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:1100px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
}

.nav-btn{
    width:60px;
    height:60px;
    border:none;
    border-radius:50%;
    background:#3498db;
    color:#fff;
    font-size:30px;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.2);
    transition:.3s;
    flex-shrink:0;
}

.nav-btn:hover{
    background:#2980b9;
    transform:scale(1.08);
}

.nav-btn:disabled{
    background:#c5cbd1;
    cursor:not-allowed;
    transform:none;
}

.grid{
    flex:1;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.12);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(0,0,0,.18);
}

.card img{
    width:100%;
    display:block;
    aspect-ratio:16/9;
    object-fit:cover;
    transition:.3s;
}

.card:hover img{
    transform:scale(1.05);
}

.toast{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:-100px;
    background:#2c3e50;
    color:white;
    padding:14px 24px;
    border-radius:12px;
    transition:.4s;
    z-index:999;
}

.toast.show{
    bottom:25px;
}

.page-indicator{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:8px 15px;
    border-radius:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    font-weight:bold;
}

@media(max-width:768px){

    body{
        padding:10px;
    }

    .container{
        gap:8px;
    }

    .grid{
        gap:10px;
    }

    .nav-btn{
        width:45px;
        height:45px;
        font-size:22px;
    }
}
.home-btn{
    position:fixed;
    top:15px;
    left:15px;
    background:#27ae60;
    color:white;
    text-decoration:none;
    padding:10px 18px;
    border-radius:12px;
    font-weight:bold;
    box-shadow:0 4px 12px rgba(0,0,0,.2);
    transition:.3s;
    z-index:1000;
}

.home-btn:hover{
    background:#219150;
    transform:translateY(-2px);
}
</style>
</head>
<body>
<a href="../index.html" class="home-btn">🏠</a>
<div class="container">

    <button class="nav-btn" id="prevBtn">❮</button>

    <div class="grid" id="grid"></div>

    <button class="nav-btn" id="nextBtn">❯</button>

</div>

<div class="page-indicator" id="pageInfo"></div>

<div class="toast" id="toast">
    📚 Komik sedang disiapkan.
</div>

<script>

const komik = [

{
image:"https://raw.githubusercontent.com/sdn160gresik/komik/main/mtk/k-1/judul.jpg",
link:"mtk/petualangan_angka.html"
},

{
image:"https://raw.githubusercontent.com/sdn160gresik/komik/main/bhsi/k-1/judul.jpg",
link:"bhsi/surat_tanpa_nama.html"
},

{
image:"https://raw.githubusercontent.com/sdn160gresik/komik/main/ipas/k-1/judul.jpg",
link:"ipas/Petualangan_oksi.html"
},

{
image:"https://raw.githubusercontent.com/sdn160gresik/komik/main/bhsi/mistery_buku_pelangi_kata/judul.jpg",
link:"bhsi/misteri_buku_pelangi_kata.html"
},

{
image:"https://via.placeholder.com/800x450?text=Komik+5",
link:""
},

{
image:"https://via.placeholder.com/800x450?text=Komik+6",
link:""
},

{
image:"https://via.placeholder.com/800x450?text=Komik+7",
link:""
},

{
image:"https://via.placeholder.com/800x450?text=Komik+8",
link:""
}

];

const perPage = 4;
let currentPage = 1;

function showToast(text){

    const toast = document.getElementById("toast");

    toast.textContent = text;
    toast.classList.add("show");

    setTimeout(()=>{
        toast.classList.remove("show");
    },3000);

}

function renderPage(){

    const grid = document.getElementById("grid");

    const start = (currentPage - 1) * perPage;
    const end = start + perPage;

    const data = komik.slice(start,end);

    grid.innerHTML = "";

    data.forEach(item=>{

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${item.image}" loading="lazy" alt="">
        `;

        card.onclick = ()=>{

            if(item.link && item.link.trim() !== ""){
                window.location.href = item.link;
            }else{
                showToast("📚 Komik sedang disiapkan. Silakan kembali lagi nanti.");
            }

        };

        grid.appendChild(card);

    });

    const totalPages = Math.ceil(komik.length / perPage);

    document.getElementById("pageInfo").textContent =
        currentPage + " / " + totalPages;

    document.getElementById("prevBtn").disabled =
        currentPage === 1;

    document.getElementById("nextBtn").disabled =
        currentPage === totalPages;

}

document.getElementById("prevBtn").addEventListener("click",()=>{

    if(currentPage > 1){
        currentPage--;
        renderPage();
    }

});

document.getElementById("nextBtn").addEventListener("click",()=>{

    const totalPages = Math.ceil(komik.length / perPage);

    if(currentPage < totalPages){
        currentPage++;
        renderPage();
    }

});

renderPage();

</script>

</body>
</html>
