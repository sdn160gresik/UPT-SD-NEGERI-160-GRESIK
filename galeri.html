<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Galeri - UPT SD NEGERI 160 GRESIK</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: sans-serif;
      margin: 0;
      background-color: #f2f7fb;
    }

    header {
      background-color: #007bff;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { height: 50px; }

    .judul {
      text-align: center;
      flex: 1;
    }

    .judul h1 {
      margin: 0;
      font-size: 1.8em;
      font-weight: bold;
    }

    .judul p {
      margin: 5px 0 0;
      font-size: 1.2em;
    }

    nav {
      background-color: #0056b3;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 10px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 8px 12px;
    }

    nav a:hover {
      background-color: #003f80;
    }

    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #007bff;
      min-width: 160px;
      top: 100%;
      left: 0;
      z-index: 999;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .dropdown-content a {
      display: block;
      padding: 10px;
      color: white;
      text-decoration: none;
    }

    .dropdown-content a:hover {
      background-color: #004080;
    }

    .hero {
      text-align: center;
      padding: 20px;
    }

    .galeri {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .galeri img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    .load-more {
      display: block;
      margin: 10px auto 40px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .load-more:hover {
      background-color: #0056b3;
    }

    @media (max-width: 600px) {
      .logo { height: 40px; }
      .judul h1 { font-size: 1.4em; }
      .judul p { font-size: 1em; }
      nav { flex-direction: column; align-items: center; }
      .dropdown-content { position: static; width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

  <header>
    <img src="tutwuri.png" alt="Logo Tutwuri" class="logo" />
    <div class="judul">
      <h1>UPT SD NEGERI 160 GRESIK</h1>
      <p>Galeri Sekolah</p>
    </div>
    <img src="logo.png" alt="Logo Sekolah" class="logo" />
  </header>

  <nav>
    <a href="index.html">Beranda</a>
    <a href="profil.html">Profil</a>
    <a href="guru.html">Guru & Staf</a>
    <div class="dropdown">
      <a href="#">Kelas</a>
      <div class="dropdown-content">
        <a href="kelas1.html">Kelas 1</a>
        <a href="kelas2.html">Kelas 2</a>
        <a href="kelas3.html">Kelas 3</a>
        <a href="kelas4.html">Kelas 4</a>
        <a href="kelas5.html">Kelas 5</a>
        <a href="kelas6.html">Kelas 6</a>
      </div>
    </div>
    <a href="galeri.html">Galeri</a>
    <a href="kontak.html">Kontak</a>
  </nav>

  <section class="hero">
    <p>Dokumentasi kegiatan dan momen spesial di SDN 160 Gresik</p>
  </section>

  <section class="galeri" id="galeri"></section>

  <button id="loadMore" class="load-more">Lihat Lebih Banyak</button>

  <script>
    let dataGambar = [];
    let jumlahTampil = 12;
    let ditampilkan = 0;

    fetch('data-galeri.json')
      .then(res => res.json())
      .then(data => {
        dataGambar = data;
        tampilkanGambar();
      });

    function tampilkanGambar() {
      const container = document.getElementById('galeri');
      const sisa = dataGambar.length - ditampilkan;
      const ambil = Math.min(jumlahTampil, sisa);
      for (let i = 0; i < ambil; i++) {
        const img = document.createElement('img');
        img.src = 'galeri/' + dataGambar[ditampilkan];
        img.alt = 'Foto Kegiatan ' + (ditampilkan + 1);
        container.appendChild(img);
        ditampilkan++;
      }
      if (ditampilkan >= dataGambar.length) {
        document.getElementById('loadMore').style.display = 'none';
      }
    }

    document.getElementById('loadMore').addEventListener('click', tampilkanGambar);
  </script>

</body>
</html>
