    <h2>Soal 16</h2>

    <p>
      Pasangkan istilah berikut dengan contoh yang sesuai!
    </p>

    <table>

      <tr>
        <th>Istilah</th>
        <th>Pilihan Contoh</th>
      </tr>

      <tr>
        <td>1. Toleransi budaya</td>
        <td>
          <select id="q1">
            <option value="">-- Pilih --</option>
            <option value="A">A. Ikut menjaga kebersihan lingkungan bersama warga</option>
            <option value="B">B. Menghargai upacara adat dari daerah lain</option>
            <option value="C">C. Menggunakan produk buatan dalam negeri</option>
          </select>
        </td>
      </tr>

      <tr>
        <td>2. Kerja sama</td>
        <td>
          <select id="q2">
            <option value="">-- Pilih --</option>
            <option value="A">A. Ikut menjaga kebersihan lingkungan bersama warga</option>
            <option value="B">B. Menghargai upacara adat dari daerah lain</option>
            <option value="C">C. Menggunakan produk buatan dalam negeri</option>
          </select>
        </td>
      </tr>

      <tr>
        <td>3. Cinta tanah air</td>
        <td>
          <select id="q3">
            <option value="">-- Pilih --</option>
            <option value="A">A. Ikut menjaga kebersihan lingkungan bersama warga</option>
            <option value="B">B. Menghargai upacara adat dari daerah lain</option>
            <option value="C">C. Menggunakan produk buatan dalam negeri</option>
          </select>
        </td>
      </tr>

    </table>

    <button onclick="periksaJawaban()">
      Periksa Jawaban
    </button>

    <div id="hasil"></div>

  </div>

  <script>

    function periksaJawaban(){

      const jawabanBenar = {
        q1: "B",
        q2: "A",
        q3: "C"
      };

      let skor = 0;
      let total = 3;

      for(let key in jawabanBenar){

        let jawaban =
          document.getElementById(key).value;

        if(jawaban === jawabanBenar[key]){
          skor++;
        }
      }

      let hasil =
        document.getElementById("hasil");

      if(skor === total){

        hasil.innerHTML =
          "✅ Semua jawaban benar! Skor: " +
          skor + "/" + total;

        hasil.className = "benar";

      } else {

        hasil.innerHTML =
          "❌ Ada jawaban yang salah. Skor: " +
          skor + "/" + total;

        hasil.className = "salah";
      }
    }

  </script>
