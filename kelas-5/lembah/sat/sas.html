  <!-- Popup -->
  <div id="popup"
    class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">

    <div class="popup bg-white border-4 border-pink-500 rounded-3xl p-8 max-w-lg text-center shadow-2xl">

      </div>

      </p>

      <button onclick="tutupPopup()"
        class="mt-7 bg-gradient-to-r from-pink-500 to-purple-500 hover:scale-105 transition transform text-white font-bold px-8 py-3 rounded-full shadow-lg">
        ✨ Tutup
      </button>

    </div>
  </div>

 <script>

  async function bukaLatihan(link) {

    try {

      // Mengecek apakah file tersedia
      const response = await fetch(link, {
        method: 'HEAD'
      });

      // Jika file ditemukan
      if (response.ok) {

        window.location.href = link;

      } else {

        // Jika file tidak ditemukan
        tampilkanPopup();

      }

    } catch (error) {

      // Jika terjadi error
      tampilkanPopup();

    }

  }

  function tampilkanPopup() {

    document.getElementById("popup")
      .classList.remove("hidden");

  }

  function tutupPopup() {

    document.getElementById("popup")
      .classList.add("hidden");

  }

</script>
